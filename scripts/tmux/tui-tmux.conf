# Genie TUI — minimal config without shell probes or status bars
# This config is for the TUI display server (-L genie-tui) ONLY.
# The agent server (-L genie) uses genie.tmux.conf.

# Terminal correctness
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g escape-time 0
set -g focus-events on
set -g history-limit 50000

# Keep server alive — genie serve owns the lifecycle, not client attach/detach
set -g destroy-unattached off
set -g exit-empty off

# Clipboard
set -g set-clipboard on
set -g allow-passthrough on
set -ga terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\7"

# Mouse off (apps handle their own via passthrough)
set -g mouse off
setw -g mode-keys vi

# Vi copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# NO status bars, NO pane-border shell probes — TUI renders its own UI
set -g status off
set -g pane-border-status off

# Pane borders (visual only, no #() shell commands)
set -g pane-border-style "fg=#0f3460"
set -g pane-active-border-style "fg=#7b2ff7"
