# ============================================================================
# Genie TUI — tmux configuration
# Dark theme with purple/cyan/gold palette
# Native tmux 3.3+, zero plugins
#
# Layout:
#   TOP:     pane-border — left: version + folder | right: git, CPU, RAM, time
#   BOTTOM:  status line 0 — window tabs for current session (clickable)
#            status line 1 — agent sessions list (clickable to switch)
# ============================================================================

# --- Terminal & basics ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard external
set -g allow-passthrough on
set -ga terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\7"

# --- Mouse & vi mode ---
if-shell '[ "$GENIE_TMUX_MOUSE" != "off" ]' 'set -g mouse on'
setw -g mode-keys vi

# --- Genie dark theme palette ---
# Background:  #1a1a2e (deep navy)
# Surface:     #16213e (panel bg)
# Border:      #0f3460 (subtle blue)
# Active:      #7b2ff7 (purple — active tab, accents)
# Inactive:    #b8a9c9 (lavender — inactive tab text)
# Cyan:        #00d2ff (info accents)
# Gold:        #f5a623 (warnings, updates)
# Text:        #e0e0e0 (primary text)
# Dim:         #6c6c8a (dim text)

# --- Pane borders ---
set -g pane-border-style "fg=#0f3460"
set -g pane-active-border-style "fg=#7b2ff7"

# --- Message styling ---
set -g message-style "bg=#16213e,fg=#00d2ff"
set -g message-command-style "bg=#16213e,fg=#f5a623"

# --- Mode (copy mode) styling ---
setw -g mode-style "bg=#7b2ff7,fg=#e0e0e0"

# --- Clock ---
setw -g clock-mode-colour "#7b2ff7"

# ============================================================================
# TOP BAR — pane-border: clean labels, NO shell probes
# Shell probes (#() calls) cause garbled escape sequences when TUI/app
# attaches to agent sessions. Observability lives in TUI/app status bar.
# ============================================================================
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-format "\
#[align=left,bg=#16213e,fg=#e0e0e0]\
 #[fg=#7b2ff7,bold]Genie#[fg=#6c6c8a,nobold] \
#[fg=#0f3460]│ \
#[fg=#b8a9c9]#{pane_current_path}\
#[align=right,bg=#16213e]\
#[fg=#e0e0e0]#{session_name}:#{window_name} \
#[fg=#0f3460]│ \
#[fg=#e0e0e0]%H:%M "

# ============================================================================
# BOTTOM BARS — dual status lines (status 2)
#   Line 0 (top):    windows in current session (clickable tabs)
#   Line 1 (bottom): agents = tmux sessions (clickable to switch)
# ============================================================================
set -g status on
set -g status 2
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"

# --- Line 0 (very bottom): Window tabs for current session ---
set -g status-format[0] "#[align=left,bg=#1a1a2e,fg=#e0e0e0] #{W:#[range=window|#{window_index}]#{?#{window_active},#[bg=#7b2ff7#,fg=#e0e0e0#,bold] #{window_index}:#{window_name} #[bg=#1a1a2e#,fg=#7b2ff7#,nobold],#[bg=#1a1a2e#,fg=#b8a9c9] #{window_index}:#{window_name} }#[norange default]}#[align=right,bg=#1a1a2e,fg=#6c6c8a]#{session_name} "

# --- Line 1 (above, closer to content): Agent sessions ---
set -g status-format[1] "#[align=left,bg=#16213e,fg=#b8a9c9] #[fg=#6c6c8a]Agents: #{S:#[range=session|#{session_name}]#{?#{==:#{session_name},#{client_session}},#[bg=#7b2ff7#,fg=#e0e0e0#,bold] #{session_name} #[bg=#16213e#,nobold],#[bg=#16213e#,fg=#b8a9c9] #{session_name} }#[norange default]}"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ============================================================================
# KEYBINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.genie/tmux.conf \; display-message "Config reloaded"

# Ctrl+T — new tab in current session
bind -n C-t new-window -c "#{?session_path,#{session_path},#{pane_current_path}}"

# Vi copy mode bindings — pipe to osc52-copy.sh for clipboard over SSH
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.genie/scripts/osc52-copy.sh"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.genie/scripts/osc52-copy.sh"

# Mouse selection: drag to select, release copies to clipboard + exits copy-mode
bind -T root MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.genie/scripts/osc52-copy.sh"

# Session switching — Alt+[ / Alt+] cycle sessions (works in all terminals)
bind -n M-] switch-client -n
bind -n M-[ switch-client -p

# Window switching — Alt+left / Alt+right cycle windows
bind -n M-Left previous-window
bind -n M-Right next-window

# Interactive picker — prefix+s for sessions, prefix+w for windows
bind s choose-tree -s
bind w choose-tree -w

# Single-click on status bar: select clicked window
bind -n MouseDown1Status select-window -t =
bind -n MouseDown1StatusDefault select-window -t =

# Single-click on right side of status bar: open session picker
bind -n MouseDown1StatusRight choose-tree -s

# Double-click anywhere on status bar or pane: open session/window picker
bind -n DoubleClick1Pane choose-tree -s
bind -n DoubleClick1Status choose-tree -s
bind -n DoubleClick1StatusDefault choose-tree -s
bind -n DoubleClick1StatusLeft choose-tree -s
bind -n DoubleClick1StatusRight choose-tree -s

# Disable tmux 3.3+ default right-click context menus (issue #1153).
# Agent panes are shells, but the menus still confuse the "tmux is invisible"
# mental model. Keeping the agent server in lockstep with the TUI server.
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
unbind -n MouseDown3StatusDefault
unbind -n M-MouseDown3Pane
unbind -n M-MouseDown3Status
unbind -n M-MouseDown3StatusLeft
