# ============================================================================
# Genie TUI — tmux configuration
# Dark theme with purple/cyan/gold palette
# Native tmux, zero plugins
# ============================================================================

# --- Terminal & basics ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Mouse & vi mode ---
set -g mouse on
setw -g mode-keys vi

# --- Genie dark theme palette ---
# Background:  #1a1a2e (deep navy)
# Surface:     #16213e (panel bg)
# Border:      #0f3460 (subtle blue)
# Active:      #7b2ff7 (purple — active tab, accents)
# Inactive:    #b8a9c9 (lavender — inactive tab text)
# Cyan:        #00d2ff (info accents)
# Gold:        #f5a623 (warnings, updates)
# Text:        #e0e0e0 (primary text)
# Dim:         #6c6c8a (dim text)

# --- Pane borders (no status, just styling) ---
set -g pane-border-style "fg=#0f3460"
set -g pane-active-border-style "fg=#7b2ff7"
set -g pane-border-status off

# --- Message styling ---
set -g message-style "bg=#16213e,fg=#00d2ff"
set -g message-command-style "bg=#16213e,fg=#f5a623"

# --- Mode (copy mode) styling ---
setw -g mode-style "bg=#7b2ff7,fg=#e0e0e0"

# --- Clock ---
setw -g clock-mode-colour "#7b2ff7"

# ============================================================================
# DUAL STATUS BAR — Two lines at the bottom
#   Line 0 (top):    clickable session list (agents)
#   Line 1 (bottom): clickable window tabs + version + git/CPU/RAM/clock
# ============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status 2
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"

# --- Line 0 uses status-left/right (rendered via #{T:status-left/right}) ---
# Keep them empty — tabs only, no branding or info on this line
set -g status-left ""
set -g status-left-length 0
set -g status-right ""
set -g status-right-length 0
set -g status-justify left

# --- Line 0 (top): clickable sessions + version/CPU/RAM/git/clock ---
set -g status-format[0] "#[align=left,bg=#16213e]#[bg=#7b2ff7,fg=#e0e0e0,bold] 🧞 #(genie --version 2>/dev/null | head -1 || echo Genie) #[bg=#16213e,fg=#7b2ff7,nobold] #{S:#[range=session|#{session_name}]#{?#{==:#{session_name},#{client_session}},#[bg=#7b2ff7 fg=#e0e0e0 bold] #{session_name} #[bg=#16213e fg=#7b2ff7 nobold],#[fg=#b8a9c9 bg=#16213e] #{session_name} }#[norange default]}#[align=right,bg=#16213e]#[fg=#6c6c8a]#($HOME/.genie/scripts/genie-git.sh) #[fg=#0f3460]| #[fg=#00d2ff]CPU #($HOME/.genie/scripts/cpu-info.sh) #[fg=#0f3460]| #[fg=#00d2ff]RAM #($HOME/.genie/scripts/ram-info.sh) #[fg=#0f3460]| #[fg=#e0e0e0]%H:%M "

# --- Line 1 (bottom): clickable window tabs ---
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

# ============================================================================
# WINDOW (TAB) STYLING — clickable tabs in line 0
# ============================================================================

# Tab separator
set -g window-status-separator ""

# Inactive tabs: lavender text on dark bg
set -g window-status-format "#[fg=#b8a9c9,bg=#1a1a2e] #I:#W "

# Active tab: purple bg, white text, bold
set -g window-status-current-format "#[fg=#1a1a2e,bg=#7b2ff7]#[fg=#e0e0e0,bg=#7b2ff7,bold] #I:#W #[fg=#7b2ff7,bg=#1a1a2e]"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f5a623,bg=#1a1a2e"

# ============================================================================
# KEYBINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Ctrl+T — new tab in current session, using session start directory
bind -n C-t new-window -c "#{?session_path,#{session_path},#{pane_current_path}}"

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Session switching — Ctrl+( / Ctrl+) cycle through sessions
bind -n C-) switch-client -n
bind -n C-( switch-client -p

# Double-click status bar opens interactive session/window picker
bind -n DoubleClick1StatusDefault choose-tree -s
