# ============================================================================
# Genie TUI — tmux configuration
# Dark theme with purple/cyan/gold palette
# Native tmux, zero plugins
# ============================================================================

# --- Terminal & basics ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Mouse & vi mode ---
set -g mouse on
setw -g mode-keys vi

# --- Genie dark theme palette ---
# Background:  #1a1a2e (deep navy)
# Surface:     #16213e (panel bg)
# Border:      #0f3460 (subtle blue)
# Active:      #7b2ff7 (purple — active tab, accents)
# Inactive:    #b8a9c9 (lavender — inactive tab text)
# Cyan:        #00d2ff (info accents)
# Gold:        #f5a623 (warnings, updates)
# Text:        #e0e0e0 (primary text)
# Dim:         #6c6c8a (dim text)

# --- Pane borders ---
set -g pane-border-style "fg=#0f3460"
set -g pane-active-border-style "fg=#7b2ff7"

# --- Message styling ---
set -g message-style "bg=#16213e,fg=#00d2ff"
set -g message-command-style "bg=#16213e,fg=#f5a623"

# --- Mode (copy mode) styling ---
setw -g mode-style "bg=#7b2ff7,fg=#e0e0e0"

# --- Clock ---
setw -g clock-mode-colour "#7b2ff7"

# ============================================================================
# STATUS BAR — Dual bar layout (tmux 3.2+)
# ============================================================================
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"

# --- Left/right (base status line, used as fallback for tmux < 3.2) ---
set -g status-left-length 60
set -g status-left "#[bg=#7b2ff7,fg=#e0e0e0,bold] #(genie --version 2>/dev/null | head -1 || echo 'Genie') #[bg=#1a1a2e,fg=#7b2ff7]"

set -g status-right-length 120
set -g status-right "#[fg=#6c6c8a]#($HOME/.genie/scripts/genie-git.sh) #[fg=#0f3460]| #[fg=#00d2ff]CPU #($HOME/.genie/scripts/cpu-info.sh) #[fg=#0f3460]| #[fg=#00d2ff]RAM #($HOME/.genie/scripts/ram-info.sh) #[fg=#0f3460]| #[fg=#e0e0e0]%H:%M "

# ============================================================================
# WINDOW (TAB) STYLING — clickable tabs (shown in bottom bar on 3.2+)
# ============================================================================

# Tab separator
set -g window-status-separator ""

# Inactive tabs: lavender text on dark bg
set -g window-status-format "#[fg=#b8a9c9,bg=#1a1a2e] #I:#W "

# Active tab: purple bg, white text, bold
set -g window-status-current-format "#[fg=#1a1a2e,bg=#7b2ff7]#[fg=#e0e0e0,bg=#7b2ff7,bold] #I:#W #[fg=#7b2ff7,bg=#1a1a2e]"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f5a623,bg=#1a1a2e"

# ============================================================================
# DUAL STATUS BAR — top: projects + system info, bottom: task tabs
# Requires tmux 3.2+ for `status 2` and `status-format[]`
# ============================================================================

# Top bar (status-format[0]): branding + project tabs (via script) + system info
set -g status-format[0] "#[align=left,bg=#1a1a2e]#[bg=#7b2ff7,fg=#e0e0e0,bold] #(genie --version 2>/dev/null | head -1 || echo 'Genie') #[bg=#1a1a2e,fg=#7b2ff7] #($HOME/.genie/scripts/genie-projects.sh)#[align=right]#[fg=#6c6c8a]#($HOME/.genie/scripts/genie-git.sh) #[fg=#0f3460]| #[fg=#00d2ff]CPU #($HOME/.genie/scripts/cpu-info.sh) #[fg=#0f3460]| #[fg=#00d2ff]RAM #($HOME/.genie/scripts/ram-info.sh) #[fg=#0f3460]| #[fg=#e0e0e0]%H:%M "

# Bottom bar (status-format[1]): task window tabs for active session (via script)
set -g status-format[1] "#[align=left,bg=#16213e] #($HOME/.genie/scripts/genie-tasks.sh #{session_name}) "

# Version guard: enable dual bar on tmux >= 3.2, fall back to single bar otherwise
if-shell '[ "$(tmux -V | cut -d" " -f2 | cut -d. -f1)" -lt 3 ]' \
  'set -g status 1' \
  'set -g status 2'

# ============================================================================
# KEYBINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Project session switching (Ctrl+) next, Ctrl+( previous)
bind -n C-) switch-client -n
bind -n C-( switch-client -p
