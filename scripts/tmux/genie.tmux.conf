# ============================================================================
# Genie TUI — tmux configuration
# Dark theme with purple/cyan/gold palette
# Native tmux, zero plugins
# ============================================================================

# --- Terminal & basics ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Mouse & vi mode ---
set -g mouse on
setw -g mode-keys vi

# --- Genie dark theme palette ---
# Background:  #1a1a2e (deep navy)
# Surface:     #16213e (panel bg)
# Border:      #0f3460 (subtle blue)
# Active:      #7b2ff7 (purple — active tab, accents)
# Inactive:    #b8a9c9 (lavender — inactive tab text)
# Cyan:        #00d2ff (info accents)
# Gold:        #f5a623 (warnings, updates)
# Text:        #e0e0e0 (primary text)
# Dim:         #6c6c8a (dim text)

# --- Pane borders ---
set -g pane-border-style "fg=#0f3460"
set -g pane-active-border-style "fg=#7b2ff7"

# --- Message styling ---
set -g message-style "bg=#16213e,fg=#00d2ff"
set -g message-command-style "bg=#16213e,fg=#f5a623"

# --- Mode (copy mode) styling ---
setw -g mode-style "bg=#7b2ff7,fg=#e0e0e0"

# --- Clock ---
setw -g clock-mode-colour "#7b2ff7"

# ============================================================================
# STATUS BAR — Bottom bar for window tabs, top pane border for info
# ============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"

# --- Top info bar via pane borders (version, projects, git, cpu, ram, clock) ---
set -g pane-border-status top
set -g pane-border-format "#[align=left,bg=#1a1a2e]#[bg=#7b2ff7,fg=#e0e0e0,bold] #(genie --version 2>/dev/null | head -1 || echo 'Genie') #[bg=#1a1a2e,fg=#7b2ff7] #($HOME/.genie/scripts/genie-projects.sh)#[align=right]#[fg=#6c6c8a]#($HOME/.genie/scripts/genie-git.sh) #[fg=#0f3460]| #[fg=#00d2ff]CPU #($HOME/.genie/scripts/cpu-info.sh) #[fg=#0f3460]| #[fg=#00d2ff]RAM #($HOME/.genie/scripts/ram-info.sh) #[fg=#0f3460]| #[fg=#e0e0e0]%H:%M "

# --- Bottom status bar: branding left + system info right ---
set -g status-left-length 60
set -g status-left "#[bg=#7b2ff7,fg=#e0e0e0,bold] #(genie --version 2>/dev/null | head -1 || echo 'Genie') #[bg=#1a1a2e,fg=#7b2ff7]"
set -g status-right-length 120
set -g status-right "#[fg=#6c6c8a]#($HOME/.genie/scripts/genie-git.sh) #[fg=#0f3460]| #[fg=#00d2ff]CPU #($HOME/.genie/scripts/cpu-info.sh) #[fg=#0f3460]| #[fg=#00d2ff]RAM #($HOME/.genie/scripts/ram-info.sh) #[fg=#0f3460]| #[fg=#e0e0e0]%H:%M "

# ============================================================================
# WINDOW (TAB) STYLING — clickable tabs in the bottom status bar
# ============================================================================

# Tab separator
set -g window-status-separator ""

# Inactive tabs: lavender text on surface bg (matches bottom bar line bg)
set -g window-status-format "#[fg=#b8a9c9,bg=#16213e] #I:#W#($HOME/.genie/scripts/genie-window-label.sh #{session_name} #{window_name}) "

# Active tab: purple bg, white text, bold with agent enrichment
set -g window-status-current-format "#[fg=#16213e,bg=#7b2ff7]#[fg=#e0e0e0,bg=#7b2ff7,bold] #I:#W#($HOME/.genie/scripts/genie-window-label.sh #{session_name} #{window_name}) #[fg=#7b2ff7,bg=#16213e]"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f5a623,bg=#1a1a2e"

# ============================================================================
# VERSION GUARD — pane-border-status requires tmux >= 2.3
# ============================================================================
# tmux < 2.3 gets bottom bar only (no top info bar via pane borders).
# pane-border-status is available since tmux 2.3, so this is a safe default.
if-shell '[ "$(tmux -V | tr -dc "0-9." | awk -F. "{v=\$1*100+\$2; print v}")" -lt 203 ]' \
  'set -g pane-border-status off'

# ============================================================================
# KEYBINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Session switching (project tabs) ---
# Ctrl+) / Ctrl+( — switch between project sessions
bind -n C-) switch-client -n
bind -n C-( switch-client -p
