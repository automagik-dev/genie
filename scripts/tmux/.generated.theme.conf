# ============================================================================
# Generated tmux theme — DO NOT EDIT BY HAND
# Source of truth: packages/genie-tokens/palette.ts
# Regenerate: bash scripts/tmux/generate-theme.sh
# ============================================================================

# --- Pane borders ---
set -g pane-border-style "fg=#2a3f4f"
set -g pane-active-border-style "fg=#7fc8a9"

# --- Message styling ---
set -g message-style "bg=#0f2638,fg=#5a8ca8"
set -g message-command-style "bg=#0f2638,fg=#d4a574"

# --- Copy/mode styling ---
setw -g mode-style "bg=#7fc8a9,fg=#0a1d2a"

# --- Clock ---
setw -g clock-mode-colour "#7fc8a9"

# --- Status line ---
set -g status-style "bg=#0a1d2a,fg=#c9cfd4"

# --- Pane-border-format (top bar) ---
set -g pane-border-format "#[align=left,bg=#0f2638,fg=#c9cfd4] #[fg=#7fc8a9,bold]Genie#[fg=#5e6e74,nobold] #[fg=#2a3f4f]│ #[fg=#8a9499]#{pane_current_path}#[align=right,bg=#0f2638]#[fg=#c9cfd4]#{session_name}:#{window_name} #[fg=#2a3f4f]│ #[fg=#c9cfd4]%H:%M "

# --- Status line 0 (very bottom): window tabs ---
set -g status-format[0] "#[align=left,bg=#0a1d2a,fg=#c9cfd4] #{W:#[range=window|#{window_index}]#{?#{window_active},#[bg=#7fc8a9#,fg=#0a1d2a#,bold] #{window_index}:#{window_name} #[bg=#0a1d2a#,fg=#7fc8a9#,nobold],#[bg=#0a1d2a#,fg=#8a9499] #{window_index}:#{window_name} }#[norange default]}#[align=right,bg=#0a1d2a,fg=#5e6e74]#{session_name} "

# --- Status line 1 (above): agent sessions ---
set -g status-format[1] "#[align=left,bg=#0f2638,fg=#8a9499] #[fg=#5e6e74]Agents: #{S:#[range=session|#{session_name}]#{?#{==:#{session_name},#{client_session}},#[bg=#7fc8a9#,fg=#0a1d2a#,bold] #{session_name} #[bg=#0f2638#,nobold],#[bg=#0f2638#,fg=#8a9499] #{session_name} }#[norange default]}"

# Token export for shell consumers (genie-projects.sh, genie-sessions.sh).
# tmux ignores #{?...} expansion of plain `setenv` lines, so these are read
# by `tmux show-environment -g GENIE_TMUX_*` from helper scripts.
set-environment -g GENIE_TMUX_BG "#0a1d2a"
set-environment -g GENIE_TMUX_BG_RAISED "#0f2638"
set-environment -g GENIE_TMUX_TEXT "#c9cfd4"
set-environment -g GENIE_TMUX_TEXT_DIM "#8a9499"
set-environment -g GENIE_TMUX_TEXT_MUTED "#5e6e74"
set-environment -g GENIE_TMUX_BORDER "#2a3f4f"
set-environment -g GENIE_TMUX_BORDER_ACTIVE "#7fc8a9"
set-environment -g GENIE_TMUX_ACCENT "#7fc8a9"
set-environment -g GENIE_TMUX_ACCENT_DIM "#5a9d82"
set-environment -g GENIE_TMUX_ACCENT_BRIGHT "#9eddc1"
