name: Build Tarballs

# Group 1 of genie-distribution-cutover — produces per-platform compiled
# binary tarballs via `bun build --compile`. Uploads each tarball as an
# artifact named `genie-${VERSION}-<platform>-tarball` (Decision 10) so
# Group 2 (sign-attest.yml) and Group 3 (release-publish.yml) can consume
# them via `pattern: genie-*-tarball` + `merge-multiple: true`.
#
# Tarball contents (per wish G1 deliverable 3):
#   genie       — bun --compile static executable
#   plugins/    — full Claude/Codex/Hermes payload: manifests, 23-skill mirror,
#                 hooks, MCP launcher, references, and optional role-agent staging
#   .agents/ + .claude-plugin/ — runtime marketplace manifests
#   skills/     — canonical skills/<name>/SKILL.md + agents/openai.yaml/resources
#   templates/  — wish-template, genie-config.template.json
#   VERSION     — plain-text stamp consumed by src/lib/version.ts
#
# Size budget: each tarball ≤80 MB compressed (CI fails if exceeded).
# Reproducibility: functional, not bit-for-bit (Decision 11). Two runs on
# the same source commit must produce binaries that pass the same smoke
# test, with size delta ≤1 MB.
#
# Mirror of the shared automagik tarball-build workflow. Decision 9: LIFTED
# (copied + adapted), not REFERENCED via composite action — drift is fine,
# cross-repo coupling is not.

# Platforms: linux-x64-glibc, linux-x64-musl, linux-arm64, darwin-arm64.
# darwin-x64 (Intel Mac) is NOT supported — Apple ended Intel Mac sales in
# 2022; Intel-Mac users run via Rosetta or the linux-x64 path under Docker.

on:
  # No `push: tags: ['v*']` — release.yml is the only tag entry-point. A
  # tag-push would otherwise fire BOTH release.yml (orchestrator) and this
  # workflow standalone, causing duplicate artifact uploads with the same
  # name and wasted runner minutes. Tag-triggered execution flows
  # exclusively through release.yml's workflow_call invocation below.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: package.json)'
        required: false
        type: string
  # Reusable from release.yml orchestrator. No inputs/outputs — version
  # derives from package.json at build time; artifacts pass via the
  # run-shared store (see actions/upload-artifact / download-artifact).
  workflow_call: {}
  pull_request:
    paths:
      - 'src/**'
      - 'skills/**'
      - 'templates/**'
      - 'plugins/**'
      - 'package.json'
      - 'LICENSE'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'scripts/build-binary.sh'
      - 'scripts/build.js'
      - 'scripts/json-top-level-string.js'
      - 'scripts/hook-bundle-parity.ts'
      - 'scripts/hook-content-binding.ts'
      - 'scripts/plugin-executables-check.ts'
      - 'scripts/sync-plugin-skills.ts'
      - 'scripts/fresh-install-smoke.ts'
      - 'scripts/skills-lint.ts'
      - 'scripts/release-payload-version.ts'
      - '.agents/plugins/marketplace.json'
      - '.claude-plugin/marketplace.json'
      - '.github/workflows/build-tarballs.yml'

concurrency:
  group: build-tarballs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # F16 gate (wish stable-release-security-gate): the standalone
  # workflow_dispatch entry is stable-capable (its tarballs feed sign + publish),
  # so a manual dispatch must target a protected `v<version>` tag, never a
  # free-form branch. The `pull_request` and orchestrated `workflow_call` paths
  # are exempt — the guard no-ops for them. github.event_name inside a
  # release.yml-dispatched workflow_call is `workflow_dispatch`, and release.yml
  # is always dispatched on the tag, so the orchestrated dev/stable flow passes.
  guard:
    name: Guard standalone dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Require a protected tag for standalone dispatch
        shell: bash
        run: bash scripts/release-guard.sh require-dispatch-tag
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ''

  build:
    needs: guard
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-glibc
            runner:   ubuntu-latest
          - platform: linux-x64-musl
            runner:   ubuntu-latest
          - platform: linux-arm64
            runner:   ubuntu-24.04-arm
          - platform: darwin-arm64
            runner:   macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build tarball
        shell: bash
        run: bash scripts/build-binary.sh --platform ${{ matrix.platform }} --version ${{ steps.ver.outputs.version }}

      - name: Smoke test (extract + --version on linux runners)
        if: matrix.platform == 'linux-x64-glibc' || matrix.platform == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          STAGE="$(mktemp -d)"
          tar -xzf "${TARBALL}" -C "${STAGE}"
          ACTUAL=$("${STAGE}/genie" --version 2>&1 | tail -n1)
          if [[ "${ACTUAL}" != "${VERSION}" ]]; then
            echo "::error::genie --version mismatch: expected '${VERSION}', got '${ACTUAL}'"
            exit 1
          fi
          "${STAGE}/genie" --help >/dev/null
          echo "smoke ok: --version=${ACTUAL}; --help exit 0"

      - name: Smoke test (musl binary in alpine container)
        if: matrix.platform == 'linux-x64-musl'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TARBALL="dist/genie-${VERSION}-linux-x64-musl.tar.gz"
          STAGE="$(mktemp -d)"
          tar -xzf "${TARBALL}" -C "${STAGE}"
          # bun's musl binary dynamically links to libstdc++ (libgcc); alpine
          # ships musl libc but not libstdc++ by default — install it before
          # exec'ing the binary.
          docker run --rm -v "${STAGE}:/app:ro" -e VERSION="${VERSION}" alpine:3.19 sh -c '
            set -e
            apk add --no-cache libstdc++ >/dev/null
            ACTUAL=$(/app/genie --version 2>&1 | tail -n1)
            if [ "${ACTUAL}" != "${VERSION}" ]; then
              echo "::error::genie --version mismatch: expected ${VERSION}, got ${ACTUAL}"
              exit 1
            fi
            /app/genie --help >/dev/null
            echo "smoke ok (alpine): --version=${ACTUAL}; --help exit 0"
          '

      - name: Smoke test (extract + --version on macOS runners)
        if: startsWith(matrix.platform, 'darwin-')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          STAGE="$(mktemp -d)"
          tar -xzf "${TARBALL}" -C "${STAGE}"
          ACTUAL=$("${STAGE}/genie" --version 2>&1 | tail -n1)
          if [[ "${ACTUAL}" != "${VERSION}" ]]; then
            echo "::error::genie --version mismatch: expected '${VERSION}', got '${ACTUAL}'"
            exit 1
          fi
          "${STAGE}/genie" --help >/dev/null
          echo "smoke ok: --version=${ACTUAL}; --help exit 0"

      - name: Verify size budget (≤80 MB compressed)
        shell: bash
        run: |
          TARBALL="dist/genie-${{ steps.ver.outputs.version }}-${{ matrix.platform }}.tar.gz"
          SIZE_MB=$(( $(stat -c '%s' "${TARBALL}" 2>/dev/null || stat -f '%z' "${TARBALL}") / 1024 / 1024 ))
          echo "Tarball size: ${SIZE_MB} MB"
          if (( SIZE_MB > 80 )); then
            echo "::error::tarball ${SIZE_MB}MB exceeds 80MB budget"
            exit 1
          fi

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v5
        with:
          name: genie-${{ steps.ver.outputs.version }}-${{ matrix.platform }}-tarball
          path: dist/genie-${{ steps.ver.outputs.version }}-${{ matrix.platform }}.tar.gz
          retention-days: 14
          if-no-files-found: error
