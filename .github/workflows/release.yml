name: Release

# Orchestrator: tag push (or workflow_dispatch) → build → sign-attest →
# publish. Single workflow run, three sequenced jobs via workflow_call.
# No workflow_run chaining (anti-recursion guard). Cosign step lives in
# sign-attest.yml — release.yml is signature-free.
#
# Trigger contract — refs/tags/v* (or operator-invoked workflow_dispatch).
# build-tarballs.yml derives version from package.json at build time;
# sign-attest.yml + release-publish.yml receive version via workflow_call
# inputs. Per-job `permissions:` blocks declare the union of the called
# workflow's inner needs (caller is the ceiling — workflow_call does NOT
# auto-inherit, per Decision #7 of the wish). `secrets: inherit` on every
# uses: invocation for forward-compat.
#
# The cosign keyless OIDC SAN URI remains
# `.github/workflows/sign-attest.yml@<ref>` because the cosign step
# physically lives inside sign-attest.yml — install.sh:24's identity pin
# is preserved by construction (Decision #1).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 4.260510.6 — no v prefix)'
        required: true
        type: string
      channel:
        description: 'Release channel — stable publishes to @latest; homolog + dev are prereleases with their own .well-known/<channel>.json pointer'
        required: false
        type: choice
        default: stable
        # Canonical channel taxonomy (Felipe directive 2026-05-12,
        # unified across the automagik sibling projects):
        #   stable  → main branch    → .well-known/latest.json
        #   homolog → homolog branch → .well-known/homolog.json
        #   dev     → dev branch     → .well-known/dev.json
        # beta + canary retired. genie may not have an active homolog
        # branch yet (omni does); the channel surface is kept for
        # cross-repo taxonomy parity + future operator dispatch.
        options:
          - stable
          - homolog
          - dev

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build-tarballs.yml
    permissions:
      contents: read
    secrets: inherit

  sign-attest:
    needs: build
    uses: ./.github/workflows/sign-attest.yml
    permissions:
      contents: write       # SLSA reusable nested upload-assets check (#1740)
      id-token: write       # cosign keyless + attest-build-provenance OIDC
      attestations: write   # GitHub Attestations API registration
      actions: read         # cross-run artifact metadata
    secrets: inherit
    # No `with.version:` — sign-attest.yml derives the bare version from
    # tarball filenames (genie-<VERSION>-<PLATFORM>.tar.gz). Passing
    # github.ref_name on tag pushes would leak the `v` prefix and fail
    # sign-attest's input/derived version equality check at line 129-132.

  publish:
    needs: sign-attest
    uses: ./.github/workflows/release-publish.yml
    permissions:
      contents: write       # gh release create/upload + push latest.json commit
      id-token: write       # reserved for any OIDC-using publish-time verifiers
    secrets: inherit
    with:
      version: ${{ needs.sign-attest.outputs.version }}
      # workflow_dispatch supplies the channel (version.yml passes 'dev' for
      # dev-branch dispatches, 'stable' for main-branch dispatches). Bare
      # tag pushes fall through to stable. See wish release-channel-dev.
      channel: ${{ inputs.channel || 'stable' }}
      draft: false
