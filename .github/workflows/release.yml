name: Release

# Creates a GitHub Release object (tag + changelog) on every push to main.
# npm publishing is intentionally NOT handled here — `version.yml` owns the
# entire publish path for both `@next` (dev) and `@latest` (main) via a single
# npm Trusted Publisher entry. Keeping publish logic in one workflow avoids
# double-publishes, duplicate Trusted Publisher entries on npmjs.com, and the
# race between `release.yml` and `version.yml` both reacting to a main push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    if: "!startsWith(github.event.head_commit.message, '[skip ci]')"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=$(jq -r '.version' package.json)
          TAG="v${BASE}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — deriving hotfix version."
            TODAY=$(date -u +%y%m%d)
            EXISTING=$(gh release list --limit 100 --json tagName \
              -q "[.[].tagName | select(startswith(\"v4.${TODAY}.\"))] | length")
            BUILD=$((EXISTING + 1))
            VERSION="4.${TODAY}.${BUILD}"
            echo "Hotfix version: v${VERSION}"
            echo "hotfix=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="${BASE}"
            echo "hotfix=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Find previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREV=$(gh release list --limit 50 --json tagName -q '.[].tagName' | grep -v "^${TAG}$" | head -1)
          # Verify the tag is reachable from HEAD (same history line)
          if [ -n "$PREV" ] && git merge-base --is-ancestor "$PREV" HEAD 2>/dev/null; then
            echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
            echo "Previous release tag: ${PREV}"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "Previous release tag not reachable from HEAD — treating as initial release"
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        if: steps.prev.outputs.tag != ''
        with:
          config: cliff.toml
          args: ${{ format('{0}..HEAD', steps.prev.outputs.tag) }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Initial release of genie v4 CLI."
          fi
          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping creation"
          else
            gh release create "${TAG}" \
              --target "${{ github.sha }}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md
          fi
