name: Release

# Trusted release orchestrator. The workflow itself is always dispatched on
# refs/heads/main; a release tag is an explicitly validated source identity,
# never the workflow/control ref. version.yml supplies the exact tag SHA and
# successful source CI run. Automated dev/homolog calls come only from the
# trusted local version.yml workflow. Stable is always a first-attempt human
# dispatch; the production environment then requires a different reviewer.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (for example 5.260702.1, without a v prefix)'
        required: true
        type: string
      channel:
        description: 'Release channel (stable is the only manual channel)'
        required: true
        type: choice
        options:
          - stable
      source_sha:
        description: 'Exact commit SHA to build (the v<version> commit for dev)'
        required: true
        type: string
      source_branch:
        description: 'Branch on the successful source CI run'
        required: true
        type: choice
        options:
          - main
          - homolog
          - dev
      source_ci_run_id:
        description: 'Authorizing CI run ID (exact promotion SHA, or parent of a deterministic dev version child)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version without a v prefix'
        required: true
        type: string
      channel:
        description: 'Automated release channel'
        required: true
        type: string
      source_sha:
        description: 'Exact commit SHA to build'
        required: true
        type: string
      source_branch:
        description: 'Branch on the successful source CI run'
        required: true
        type: string
      source_ci_run_id:
        description: 'Authorizing CI run ID'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Serialize retries/promotions of one immutable version. Cross-version runs
  # stay independent so a stable approval wait cannot block automated dev or
  # homolog delivery; manifest reconciliation is monotonic and CAS-retried.
  group: release-${{ inputs.version }}
  queue: max
  cancel-in-progress: false

jobs:
  guard:
    name: Bind trusted control + source provenance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      # This checkout is the workflow/control ref (main), not source_sha. It
      # loads the guard from the same protected control commit as this workflow.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require trusted main control and CI-approved tag SHA
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          CONTROL_REF: ${{ github.ref }}
          CONTROL_SHA: ${{ github.sha }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          DISPATCH_ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          EXPECTED_REPO: ${{ github.repository }}
          EXPECTED_WORKFLOW: .github/workflows/ci.yml
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/release-guard.sh guard-trusted-release

  # Stable approval is deliberately before build/sign, not only before the
  # final upload. Keep it in a stable-only job so dev/homolog automation never
  # relies on undocumented empty-environment behavior. Rollout requirement:
  # production's deployment policy allows protected main, the control ref.
  approve-stable:
    needs: guard
    if: inputs.channel == 'stable'
    name: Approve stable release identity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
    steps:
      - name: Record approved identity
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: echo "Approved stable v${VERSION} from ${SOURCE_SHA}"

  authorize:
    needs: [guard, approve-stable]
    if: >-
      always() &&
      needs.guard.result == 'success' &&
      (inputs.channel != 'stable' || needs.approve-stable.result == 'success')
    name: Authorize release identity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record authorized identity
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: echo "Authorized v${VERSION} (${CHANNEL}) from ${SOURCE_SHA}"

  build:
    needs: authorize
    # always() + explicit result check: the default success() status is
    # poisoned transitively by the SKIPPED approve-stable job on dev/homolog
    # (observed 2026-07-20: the v5.260720.4 dev release chain silently skipped
    # build/sign/publish). authorize alone decides admission.
    if: always() && needs.authorize.result == 'success'
    uses: ./.github/workflows/build-tarballs.yml
    permissions:
      contents: read
    with:
      version: ${{ inputs.version }}
      source_sha: ${{ inputs.source_sha }}

  sign-attest:
    needs: build
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/sign-attest.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    with:
      version: ${{ inputs.version }}
      channel: ${{ inputs.channel }}
      source_sha: ${{ inputs.source_sha }}
      source_branch: ${{ inputs.source_branch }}
      source_ci_run_id: ${{ inputs.source_ci_run_id }}

  publish:
    needs: sign-attest
    if: always() && needs.sign-attest.result == 'success'
    uses: ./.github/workflows/release-publish.yml
    permissions:
      contents: write
      attestations: read
    with:
      version: ${{ inputs.version }}
      channel: ${{ inputs.channel }}
      draft: false
    # Without inherit, the called workflow's secrets context is empty and the
    # manifests job sees RELEASE_MANIFESTS_TOKEN as unset even though the
    # release-manifests environment holds it (proven on the v5.260720.10
    # stable run). Local trusted workflow — inherit is safe.
    secrets: inherit
