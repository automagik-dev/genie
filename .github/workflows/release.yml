name: Release

# Orchestrator: tag push (or workflow_dispatch) → build → sign-attest →
# publish. Single workflow run, three sequenced jobs via workflow_call.
# No workflow_run chaining (anti-recursion guard). Cosign step lives in
# sign-attest.yml — release.yml is signature-free.
#
# Trigger contract — refs/tags/v* (or operator-invoked workflow_dispatch).
# build-tarballs.yml derives version from package.json at build time;
# sign-attest.yml + release-publish.yml receive version via workflow_call
# inputs. Per-job `permissions:` blocks declare the union of the called
# workflow's inner needs (caller is the ceiling — workflow_call does NOT
# auto-inherit, per Decision #7 of the wish). Blanket `secrets: inherit` was
# removed (F18 least-privilege): the called workflows use only GITHUB_TOKEN,
# which reusable workflows receive automatically.
#
# The cosign keyless OIDC SAN URI remains
# `.github/workflows/sign-attest.yml@<ref>` because the cosign step
# physically lives inside sign-attest.yml — install.sh:24's identity pin
# is preserved by construction (Decision #1).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 5.260702.1 — no v prefix)'
        required: true
        type: string
      channel:
        description: 'Release channel — stable publishes to @latest; homolog + dev are prereleases. All channel manifests live on MAIN (.well-known/); the channel only selects which file is written'
        required: false
        type: choice
        default: stable
        # Canonical channel taxonomy (Felipe directive 2026-05-12,
        # unified across the automagik sibling projects):
        # ALL channel manifests are committed to MAIN — matching
        # install.sh's MANIFEST_BASE=.../main/.well-known for every
        # channel. The channel selects WHICH file, never the branch:
        #   stable  → main:.well-known/latest.json
        #   homolog → main:.well-known/homolog.json
        #   dev     → main:.well-known/dev.json
        # beta + canary retired. genie may not have an active homolog
        # branch yet (omni does); the channel surface is kept for
        # cross-repo taxonomy parity + future operator dispatch.
        options:
          - stable
          - homolog
          - dev

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # F16 gate (wish stable-release-security-gate): a stable-capable
  # workflow_dispatch must target a protected `v<version>` tag, never a
  # free-form branch ref. The automated dev release dispatches this workflow on
  # the freshly-pushed tag (version.yml), so dev is never blocked — the guard is
  # a tag-ref requirement on manual dispatch only (HARD INVARIANT preserved). A
  # bare `push: tags: v*` trigger is already tag-bound, so the guard no-ops for
  # it. Extracted into scripts/release-guard.sh so it is unit-tested
  # (scripts/release-guard.test.ts) rather than an unverifiable inline `${{ }}`.
  guard:
    name: Guard stable-capable dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Require a protected tag for stable-capable dispatch
        shell: bash
        run: bash scripts/release-guard.sh require-dispatch-tag
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}

  build:
    needs: guard
    uses: ./.github/workflows/build-tarballs.yml
    permissions:
      contents: read
    # GITHUB_TOKEN is provided to reusable workflows automatically; the called
    # workflows use no other secret (F18 — blanket `secrets: inherit` removed).

  sign-attest:
    needs: build
    uses: ./.github/workflows/sign-attest.yml
    permissions:
      contents: write       # SLSA reusable nested upload-assets check (#1740)
      id-token: write       # cosign keyless + attest-build-provenance OIDC
      attestations: write   # GitHub Attestations API registration
      actions: read         # cross-run artifact metadata
    # No `with.version:` — sign-attest.yml derives the bare version from
    # tarball filenames (genie-<VERSION>-<PLATFORM>.tar.gz). Passing
    # github.ref_name on tag pushes would leak the `v` prefix and fail
    # sign-attest's input/derived version equality check at line 129-132.
    # secrets: inherit removed (F18) — sign-attest only reads GITHUB_TOKEN.

  publish:
    needs: sign-attest
    uses: ./.github/workflows/release-publish.yml
    permissions:
      contents: write       # gh release create/upload + push latest.json commit
      id-token: write       # reserved for any OIDC-using publish-time verifiers
      actions: read         # release-publish's guard job reads upstream run records;
                            # a called workflow cannot elevate past the caller, so the
                            # orchestrated path fails at init without this grant
    # secrets: inherit removed (F18) — release-publish only reads GITHUB_TOKEN.
    with:
      version: ${{ needs.sign-attest.outputs.version }}
      # workflow_dispatch supplies the channel (version.yml passes 'dev' for
      # dev-branch dispatches, 'stable' for main-branch dispatches). Bare
      # tag pushes fall through to stable. See wish release-channel-dev.
      channel: ${{ inputs.channel || 'stable' }}
      draft: false
