name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  # Required for npm OIDC Trusted Publishing — exchange the GitHub OIDC
  # token for a short-lived npm publish credential. Matches ci.yml +
  # version.yml. See npmjs.com package Settings → Trusted Publishers.
  id-token: write

jobs:
  release:
    name: Create Release
    if: "!startsWith(github.event.head_commit.message, '[skip ci]')"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=$(jq -r '.version' package.json)
          TAG="v${BASE}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — deriving hotfix version."
            TODAY=$(date -u +%y%m%d)
            EXISTING=$(gh release list --limit 100 --json tagName \
              -q "[.[].tagName | select(startswith(\"v4.${TODAY}.\"))] | length")
            BUILD=$((EXISTING + 1))
            VERSION="4.${TODAY}.${BUILD}"
            echo "Hotfix version: v${VERSION}"
            echo "hotfix=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="${BASE}"
            echo "hotfix=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Find previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREV=$(gh release list --limit 50 --json tagName -q '.[].tagName' | grep -v "^${TAG}$" | head -1)
          # Verify the tag is reachable from HEAD (same history line)
          if [ -n "$PREV" ] && git merge-base --is-ancestor "$PREV" HEAD 2>/dev/null; then
            echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
            echo "Previous release tag: ${PREV}"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "Previous release tag not reachable from HEAD — treating as initial release"
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        if: steps.prev.outputs.tag != ''
        with:
          config: cliff.toml
          args: ${{ format('{0}..HEAD', steps.prev.outputs.tag) }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Initial release of genie v4 CLI."
          fi
          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping creation"
          else
            gh release create "${TAG}" \
              --target "${{ github.sha }}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch version for hotfix
        if: steps.ver.outputs.hotfix == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Patched package.json to ${VERSION}"

      - name: Build CLI
        run: bun run build

      - name: Setup Node (for npm OIDC publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x; npm Trusted Publishing (automatic OIDC
      # token exchange) requires npm >= 11.5.1. Without this upgrade,
      # `npm publish` + `npm dist-tag` send the empty placeholder token
      # and the registry returns a misleading 404.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (latest) via OIDC
        env:
          HUSKY: "0"
          # npm auto-enables provenance in any CI env with `id-token: write`,
          # regardless of the --provenance CLI flag. Self-hosted Blacksmith
          # runners fail the server-side sigstore check with 422. Disable
          # auto-provenance explicitly; OIDC token exchange still happens.
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Try publish; if version exists (from @next), just retag as latest.
          # npm dist-tag add also authenticates via the OIDC-exchanged token
          # since both commands read from the same setup-node .npmrc.
          if ! npm publish --access public 2>&1; then
            echo "Publish failed — version may already exist from @next. Retagging as latest..."
            npm dist-tag add "@automagik/genie@${VERSION}" latest
          fi
