name: Sign + Attest Tarballs

# Group 2 of genie-distribution-cutover — signs every tarball produced by
# build-tarballs.yml with cosign keyless OIDC, registers a GitHub-native
# source/control-bound native attestation, and emits SLSA Level 3 provenance via the
# upstream slsa-github-generator reusable workflow. Each tarball is then
# self-verified by cosign + slsa-verifier + gh-attestation-verify, and a
# byte-flip tamper-detection self-test asserts all three verifiers REJECT
# a mutated copy. Per-platform `genie-${VERSION}-<platform>-signed`
# artifacts (Decision 10) are uploaded for Group 3 (release-publish) to
# consume.
#
# Trigger: reusable only inside the trusted main-branch release chain, after
# the explicit source build succeeds. Stable begins at release.yml; automated
# dev/homolog begins at version.yml. It consumes same-run artifacts.
#
# Signing model is cosign KEYLESS — the OIDC identity is bound to this
# workflow file path + ref (Fulcio SAN URI). There is no long-lived key.
# See SECURITY.md "Release Signing — Pinned Identity (cosign keyless)".
#
# Outputs (per platform, uploaded as `genie-${VERSION}-<platform>-signed`):
#   genie-${VERSION}-<platform>.tar.gz                 (lifted from build-tarballs)
#   genie-${VERSION}-<platform>.tar.gz.bundle          (cosign keyless sigstore bundle)
#   genie-${VERSION}-<platform>.tar.gz.intoto.jsonl    (SLSA L3 DSSE envelope)
#
# The GitHub-native SLSA v1 attestation is registered in GitHub's Attestations
# API and looked up by digest via `gh attestation verify`.

on:
  # Reusable only from the trusted main-branch release orchestrator. Manual
  # recovery routes through release.yml and cannot bypass source provenance.
  workflow_call:
    inputs:
      version:
        description: 'Version (must match same-run build artifacts)'
        required: true
        type: string
      channel:
        description: 'Release channel bound by the trusted orchestrator'
        required: true
        type: string
      source_sha:
        description: 'Exact CI-approved commit that produced the tarballs'
        required: true
        type: string
      source_branch:
        description: 'Approved branch for the source CI run'
        required: true
        type: string
      source_ci_run_id:
        description: 'Authorizing source CI run ID'
        required: true
        type: string
    outputs:
      version:
        description: 'Resolved version (parsed from upstream tarball filenames)'
        value: ${{ jobs.prepare.outputs.version }}

concurrency:
  group: sign-attest-${{ github.ref }}-${{ inputs.version || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # The OIDC identity belongs to this called workflow, so the called workflow
  # itself must verify its caller. Otherwise an untrusted branch could call
  # sign-attest.yml@main and obtain the same client-trusted signing identity.
  admit:
    name: Admit trusted release orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Bind caller workflow and control commit
        shell: bash
        env:
          CALLER_EVENT: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_SHA: ${{ github.sha }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          EXPECTED_STABLE_CALLER: automagik-dev/genie/.github/workflows/release.yml@refs/heads/main
          EXPECTED_AUTOMATED_CALLER: automagik-dev/genie/.github/workflows/version.yml@refs/heads/main
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_SOURCE_BRANCH: ${{ inputs.source_branch }}
          INPUT_SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
        run: |
          set -euo pipefail
          case "$INPUT_CHANNEL" in
            stable)
              EXPECTED_EVENT=workflow_dispatch
              EXPECTED_CALLER="$EXPECTED_STABLE_CALLER"
              ;;
            homolog|dev)
              EXPECTED_EVENT=workflow_run
              EXPECTED_CALLER="$EXPECTED_AUTOMATED_CALLER"
              ;;
            *)
              echo "::error ::release-caller.channel unknown channel '${INPUT_CHANNEL}'"
              exit 1
              ;;
          esac
          if [[ "$CALLER_EVENT" != "$EXPECTED_EVENT" ||
                "$CALLER_REF" != refs/heads/main ||
                "$CALLER_WORKFLOW_REF" != "$EXPECTED_CALLER" ||
                "$CALLER_WORKFLOW_SHA" != "$CALLER_SHA" ]]; then
            echo "::error ::release-caller.untrusted sign-attest rejected caller ${CALLER_WORKFLOW_REF:-<empty>} (${CALLER_EVENT:-<empty>})"
            exit 1
          fi
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ||
                ! "$INPUT_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ||
                ! "$INPUT_SOURCE_CI_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error ::release-caller.inputs sign-attest received malformed release identity inputs"
            exit 1
          fi
          case "$INPUT_SOURCE_BRANCH" in main|homolog|dev) ;; *) exit 1 ;; esac
          echo "Trusted release caller admitted at ${CALLER_SHA}"

  # ---------------------------------------------------------------------------
  # prepare — resolve version, download every same-run tarball,
  # build the multi-subject base64 input the SLSA generator consumes.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare hashes for SLSA
    needs: admit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.hash.outputs.version }}
      hashes:  ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all tarball artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: genie-*-tarball
          merge-multiple: true
          path: dist

      - name: Resolve version + compute base64 subjects
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          TARBALLS=( genie-*.tar.gz )
          if [[ ${#TARBALLS[@]} -eq 0 ]]; then
            echo "::error::no genie-*.tar.gz tarballs downloaded from the current release run"
            ls -la
            exit 1
          fi
          # Extract VERSION from any tarball filename. The build-tarballs.yml
          # naming contract is `genie-<VERSION>-<PLATFORM>.tar.gz` where
          # PLATFORM is one of the 4 known platforms. Parse the first.
          FIRST="${TARBALLS[0]}"
          VERSION=$(echo "${FIRST}" | sed -E 's/^genie-(.+)-(linux-x64-glibc|linux-x64-musl|linux-arm64|darwin-arm64)\.tar\.gz$/\1/')
          if [[ -z "${VERSION}" || "${VERSION}" == "${FIRST}" ]]; then
            echo "::error::could not parse VERSION from filename '${FIRST}'"
            exit 1
          fi
          if [[ -n "${{ inputs.version }}" && "${{ inputs.version }}" != "${VERSION}" ]]; then
            echo "::error::workflow_dispatch input version='${{ inputs.version }}' does not match upstream artifact version='${VERSION}'"
            exit 1
          fi
          echo "Resolved version: ${VERSION}"
          echo "Tarballs to sign: ${#TARBALLS[@]}"
          printf '  %s\n' "${TARBALLS[@]}"
          # slsa-github-generator expects base64 of a sha256sum-style file
          # listing every subject (one `<hash>  <name>` line per subject).
          HASHES=$(sha256sum "${TARBALLS[@]}" | base64 -w0)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"
          echo "Computed multi-subject digest set:"
          sha256sum "${TARBALLS[@]}"

  # ---------------------------------------------------------------------------
  # provenance — SLSA L3 generator (reusable workflow). Produces ONE
  # .intoto.jsonl covering every tarball subject. The per-platform sign job
  # downloads it and copies it to <tarball>.intoto.jsonl.
  # ---------------------------------------------------------------------------
  provenance:
    name: SLSA Provenance (Level 3)
    needs: [prepare]
    permissions:
      id-token: write    # OIDC for SLSA provenance signing
      # `contents: write` is required even though we pass `upload-assets: false`
      # below. The SLSA generator's reusable workflow declares a nested
      # `upload-assets` job whose `permissions: contents: write` is validated
      # STATICALLY at workflow init — before `with.upload-assets` is evaluated.
      # Granting only `contents: read` produces a startup_failure with no logs:
      #   "Error calling workflow '...generator_generic_slsa3.yml@v2.1.0'.
      #    The nested job 'upload-assets' is requesting 'contents: write',
      #    but is only allowed 'contents: read'."
      # Diagnosis: run 25619410370 (first chain firing post-#1738/#1739).
      # Note: the upload-assets job still does NOT execute at runtime because
      # `with: upload-assets: false` is honored — only the static permission
      # check requires the elevated grant.
      contents: write
      actions: read      # read upstream workflow run metadata
    # SHA-PINNING EXCEPTION (wish stable-release-security-gate, F18): the SLSA
    # generator reusable workflow MUST be referenced by an exact `@vX.Y.Z`
    # semver tag and CANNOT be pinned to a commit SHA. slsa-verifier derives the
    # trusted builder identity from this tag, and the generator FAILS THE BUILD
    # if referenced by a hash or a shorter tag (`@vX` / `@vX.Y`). See
    # slsa-github-generator README ("It also needs to be referred as `@vX.Y.Z`")
    # and slsa-verifier issue #12. Pinning here would break stable provenance.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.prepare.outputs.hashes }}
      provenance-name: genie-${{ needs.prepare.outputs.version }}.intoto.jsonl
      upload-assets: false

  # ---------------------------------------------------------------------------
  # sign — per-platform: cosign keyless sign-blob + GitHub-native
  # source/control-bound native attestation + self-verify (3 verifiers) + tamper-detection
  # self-test + per-platform signed artifact upload.
  # ---------------------------------------------------------------------------
  sign:
    name: Sign ${{ matrix.platform }}
    needs: [prepare, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write       # OIDC for cosign keyless + actions/attest
      attestations: write   # register the source/control-bound native predicate
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-x64-glibc
          - linux-x64-musl
          - linux-arm64
          - darwin-arm64

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download tarball artifact (${{ matrix.platform }})
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}-tarball
          path: dist

      - name: Download SLSA provenance artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # SLSA generator v2.1.0 uploads the provenance as an artifact whose
          # name == the provenance-name input. The artifact contains one file
          # at the same path. After download the file lands at dist/<name>.
          #
          # The reusable `provenance` job declares no `outputs`, so referencing
          # `needs.provenance.outputs.provenance-name` resolves to EMPTY and
          # download-artifact silently no-ops (run 25997850533: the artifact
          # genie-<version>.intoto.jsonl was produced but never staged at
          # dist/, failing "Stage provenance per-platform"). genie controls
          # the artifact name via the provenance-name INPUT (line ~171), so
          # reconstruct the same deterministic string from the same version
          # source instead of depending on a nonexistent job output.
          name: genie-${{ needs.prepare.outputs.version }}.intoto.jsonl
          path: dist

      - name: Stage provenance per-platform
        shell: bash
        env:
          VERSION:  ${{ needs.prepare.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          SRC="dist/genie-${VERSION}.intoto.jsonl"
          DEST="dist/genie-${VERSION}-${PLATFORM}.tar.gz.intoto.jsonl"
          if [[ ! -s "${SRC}" ]]; then
            echo "::error::missing or empty SLSA provenance ${SRC}"
            exit 1
          fi
          # The SLSA generator emits ONE .intoto.jsonl whose subjects list
          # covers EVERY tarball. Copying it to the per-tarball name lets
          # `slsa-verifier verify-artifact <tarball> --provenance-path <copy>`
          # match by sha256 — verifier scans the subjects array.
          cp "${SRC}" "${DEST}"
          ls -la "${DEST}"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: cosign sign-blob (keyless OIDC, sigstore bundle)
        shell: bash
        env:
          COSIGN_YES:    'true'
          VERSION:       ${{ needs.prepare.outputs.version }}
          PLATFORM:      ${{ matrix.platform }}
        run: |
          set -euo pipefail
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          BUNDLE="${TARBALL}.bundle"
          if [[ ! -s "${TARBALL}" ]]; then
            echo "::error::missing or empty tarball ${TARBALL}"
            exit 1
          fi
          # Keyless cosign sign-blob writes a sigstore-bundle file containing
          # the ephemeral Fulcio cert + signature + Rekor entry in one file.
          # `--bundle` is the new-style output (replaces --output-signature
          # + --output-certificate); cosign verify-blob --bundle reads it
          # back without separate sig/cert files.
          cosign sign-blob \
            --yes \
            --bundle "${BUNDLE}" \
            "${TARBALL}"
          if [[ ! -s "${BUNDLE}" ]]; then
            echo "::error::cosign sign-blob produced empty bundle"
            exit 1
          fi
          echo "::notice::signed ${TARBALL} -> ${BUNDLE}"

      - name: Build source/control-bound native SLSA predicate
        shell: bash
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ inputs.channel }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          CONTROL_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bash scripts/release-native-predicate.sh create "${RUNNER_TEMP}/genie-native-${{ matrix.platform }}.json"

      - name: GitHub-native source/control attestation
        uses: actions/attest@67422f5511b7ff725f4dbd6fb9bd2cd925c65a8d # v1.4.1
        with:
          subject-path: dist/genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz
          # Custom predicate type (same URI as the predicate's buildType):
          # claiming https://slsa.dev/provenance/v1 makes GitHub's attestation
          # API run SLSA validation, which rejects our custom buildType.
          predicate-type: https://github.com/${{ github.repository }}/release-tarballs/v1
          predicate-path: ${{ runner.temp }}/genie-native-${{ matrix.platform }}.json

      - name: Verify cosign bundle (self-check)
        shell: bash
        env:
          VERSION:  ${{ needs.prepare.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          # Cert identity is pinned to THIS workflow file path; the @<ref>
          # tail varies by trigger (workflow_run pushes default-branch ref;
          # workflow_dispatch pushes the dispatched ref). The regex tolerates
          # the ref while keeping the workflow path immutable.
          cosign verify-blob \
            --bundle "${TARBALL}.bundle" \
            --certificate-identity-regexp "^https://github\\.com/${{ github.repository }}/\\.github/workflows/sign-attest\\.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${TARBALL}"

      - name: Verify SLSA provenance (self-check)
        shell: bash
        env:
          VERSION:          ${{ needs.prepare.outputs.version }}
          PLATFORM:         ${{ matrix.platform }}
          CHANNEL:          ${{ inputs.channel }}
          SOURCE_SHA:       ${{ inputs.source_sha }}
          SOURCE_BRANCH:    ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          CONTROL_SHA:      ${{ github.sha }}
        run: |
          set -euo pipefail
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          VERIFIED_PROVENANCE="${RUNNER_TEMP}/genie-generic-${PLATFORM}.json"
          VERIFY_ARGS=(
            verify-artifact "${TARBALL}"
            --provenance-path "${TARBALL}.intoto.jsonl"
            --source-uri "github.com/${{ github.repository }}"
            --source-branch main
          )
          # slsa-verifier's --build-workflow-input applies only to a top-level
          # workflow_dispatch. Automated dev/homolog runs have version.yml's
          # workflow_run context; the helper below binds that signed event to
          # the exact successful CI run instead.
          if [[ "$CHANNEL" == "stable" ]]; then
            VERIFY_ARGS+=(
              --build-workflow-input "version=${VERSION}"
              --build-workflow-input "channel=${CHANNEL}"
              --build-workflow-input "source_sha=${SOURCE_SHA}"
              --build-workflow-input "source_branch=${SOURCE_BRANCH}"
              --build-workflow-input "source_ci_run_id=${SOURCE_CI_RUN_ID}"
            )
          fi
          slsa-verifier "${VERIFY_ARGS[@]}" --print-provenance >"$VERIFIED_PROVENANCE"
          RELEASE_REPOSITORY="${{ github.repository }}" \
            bash scripts/release-generic-provenance.sh verify-exact "$VERIFIED_PROVENANCE"

      - name: Verify GitHub-native attestation (self-check)
        shell: bash
        env:
          GH_TOKEN:          ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          VERSION:           ${{ needs.prepare.outputs.version }}
          PLATFORM:          ${{ matrix.platform }}
          CHANNEL:           ${{ inputs.channel }}
          SOURCE_SHA:        ${{ inputs.source_sha }}
          SOURCE_BRANCH:     ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID:  ${{ inputs.source_ci_run_id }}
          CONTROL_SHA:       ${{ github.sha }}
          RUN_ID:            ${{ github.run_id }}
          RUN_ATTEMPT:       ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          RESULT="${RUNNER_TEMP}/genie-native-result-${PLATFORM}.json"
          gh attestation verify "${TARBALL}" \
            --repo "$RELEASE_REPOSITORY" \
            --predicate-type "https://github.com/${RELEASE_REPOSITORY}/release-tarballs/v1" \
            --cert-identity "https://github.com/${RELEASE_REPOSITORY}/.github/workflows/sign-attest.yml@refs/heads/main" \
            --source-ref refs/heads/main \
            --source-digest "$CONTROL_SHA" \
            --signer-digest "$CONTROL_SHA" \
            --format json >"$RESULT"
          bash scripts/release-native-predicate.sh verify "$RESULT"

      - name: Tamper-detection self-test (all 3 verifiers must REJECT)
        shell: bash
        env:
          GH_TOKEN:          ${{ github.token }}
          VERSION:           ${{ needs.prepare.outputs.version }}
          PLATFORM:          ${{ matrix.platform }}
          CHANNEL:           ${{ inputs.channel }}
          SOURCE_SHA:        ${{ inputs.source_sha }}
          SOURCE_BRANCH:     ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID:  ${{ inputs.source_ci_run_id }}
          CONTROL_SHA:       ${{ github.sha }}
        run: |
          set -euo pipefail
          TARBALL="dist/genie-${VERSION}-${PLATFORM}.tar.gz"
          MUTATED="dist/tampered-genie-${VERSION}-${PLATFORM}.tar.gz"
          cp "${TARBALL}" "${MUTATED}"

          # Flip the last byte. Any single-byte mutation invalidates the
          # SHA-256 subject that cosign signed AND the SLSA subject hash
          # AND the GitHub Attestations API digest lookup.
          SIZE=$(stat -c '%s' "${MUTATED}")
          OFFSET=$((SIZE - 1))
          ORIG_BYTE=$(xxd -p -s "${OFFSET}" -l 1 "${MUTATED}")
          FLIPPED=$(printf '%02x' $((0x${ORIG_BYTE} ^ 0x01)))
          printf '%b' "\x${FLIPPED}" | dd of="${MUTATED}" bs=1 seek="${OFFSET}" count=1 conv=notrunc status=none
          if cmp -s "${TARBALL}" "${MUTATED}"; then
            echo "::error::mutation produced identical bytes — test harness is broken"
            exit 1
          fi

          echo "-> Expecting cosign verify-blob to REJECT mutated tarball"
          if cosign verify-blob \
              --bundle "${TARBALL}.bundle" \
              --certificate-identity-regexp "^https://github\\.com/${{ github.repository }}/\\.github/workflows/sign-attest\\.yml@refs/heads/main$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${MUTATED}" > /tmp/cosign-tamper.log 2>&1; then
            echo "::error::cosign verify-blob accepted a mutated tarball — signing contract broken"
            cat /tmp/cosign-tamper.log >&2 || true
            exit 1
          fi
          echo "OK: cosign rejected mutated tarball"

          echo "-> Expecting slsa-verifier verify-artifact to REJECT mutated tarball"
          if slsa-verifier verify-artifact "${MUTATED}" \
              --provenance-path "${TARBALL}.intoto.jsonl" \
              --source-uri "github.com/${{ github.repository }}" \
              --source-branch main \
              --build-workflow-input "version=${VERSION}" \
              --build-workflow-input "channel=${CHANNEL}" \
              --build-workflow-input "source_sha=${SOURCE_SHA}" \
              --build-workflow-input "source_branch=${SOURCE_BRANCH}" \
              --build-workflow-input "source_ci_run_id=${SOURCE_CI_RUN_ID}" > /tmp/slsa-tamper.log 2>&1; then
            echo "::error::slsa-verifier accepted a mutated tarball — provenance contract broken"
            cat /tmp/slsa-tamper.log >&2 || true
            exit 1
          fi
          echo "OK: slsa-verifier rejected mutated tarball"

          echo "-> Expecting gh attestation verify to REJECT mutated tarball"
          if gh attestation verify "${MUTATED}" \
              --repo "${{ github.repository }}" \
              --predicate-type "https://github.com/${{ github.repository }}/release-tarballs/v1" \
              --cert-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-attest.yml@refs/heads/main" \
              --source-ref refs/heads/main \
              --source-digest "$CONTROL_SHA" \
              --signer-digest "$CONTROL_SHA" > /tmp/gh-tamper.log 2>&1; then
            echo "::error::gh attestation verify accepted a mutated tarball — Attestations API contract broken"
            cat /tmp/gh-tamper.log >&2 || true
            exit 1
          fi
          echo "OK: gh attestation verify rejected mutated tarball"

          rm -f "${MUTATED}"

      - name: Upload signed artifact (${{ matrix.platform }})
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}-signed
          path: |
            dist/genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz
            dist/genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz.bundle
            dist/genie-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz.intoto.jsonl
          retention-days: 30
          if-no-files-found: error
