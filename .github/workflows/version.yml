name: Version

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: version-${{ github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: false

jobs:
  auto-version:
    name: Auto Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       !contains(github.event.workflow_run.head_commit.message, '[auto-version]') &&
       (
         (github.event.workflow_run.head_branch == 'main' &&
          startsWith(github.event.workflow_run.head_commit.message, 'Merge pull request') &&
          contains(github.event.workflow_run.head_commit.message, '/dev'))
         ||
         (github.event.workflow_run.head_branch == 'dev')
       ))

    steps:
      - name: Determine branch and version prefix
        id: context
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || 'dev' }}"
          if [ "$BRANCH" = "main" ]; then
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            echo "prefix=4" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            echo "prefix=4" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved: branch=dev, prefix=4"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive version
        id: version
        run: |
          PREFIX="${{ steps.context.outputs.prefix }}"
          TODAY=$(date -u +%y%m%d)
          EXISTING=$(git tag --list "v${PREFIX}.${TODAY}.*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))
          VERSION="${PREFIX}.${TODAY}.${BUILD_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${VERSION}"

      - name: Sync all version files
        run: bun run version
        env:
          GENIE_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}

      - name: Format versioned JSON (Biome)
        run: |
          bunx biome format --write package.json openclaw.plugin.json plugins/genie/.claude-plugin/plugin.json plugins/genie/package.json .claude-plugin/marketplace.json 2>/dev/null || true

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.context.outputs.branch }}"

          git add -A '*.json' 'src/lib/version.ts'
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(version): bump to ${VERSION} [auto-version]"
          fi

          git tag "v${VERSION}"
          git push --atomic origin "HEAD:refs/heads/${BRANCH}" "refs/tags/v${VERSION}"

      - name: Build CLI
        run: bun run build

      - name: Setup Node (for npm OIDC publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x; npm Trusted Publishing (automatic OIDC
      # token exchange) requires npm >= 11.5.1. Without this upgrade,
      # `npm publish` sends the empty placeholder token and the registry
      # returns a misleading 404 instead of the real 401/403 auth failure.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm via OIDC
        env:
          HUSKY: "0"
          # npm auto-enables provenance in any CI env with `id-token: write`,
          # regardless of the --provenance CLI flag. Self-hosted Blacksmith
          # runners fail the server-side sigstore check with 422. Disable
          # auto-provenance explicitly; OIDC token exchange still happens.
          NPM_CONFIG_PROVENANCE: "false"
        run: npm publish --access public --tag ${{ steps.context.outputs.npm_tag }}
