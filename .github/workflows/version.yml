name: Version

# Single source of version derivation + tag push for @automagik/genie.
#
#   Trigger                              Context  Bump?
#   -----------------------------------  -------  ------
#   workflow_run (CI success on dev)     dev      yes
#   workflow_run (merge PR to main)      main     no
#
# On dev triggers we DERIVE a fresh version (today + build-count),
# commit + tag + push back to dev, then call the main-controlled reusable
# release workflow with the successful parent CI run. The release guard accepts
# the child only when all six changed fields are the deterministic version bump.
#
# On homolog/main promotion triggers, derive a fresh immutable release identity
# without rewriting the source tree. The successful branch CI run and a new
# tag at that exact commit produce the automated/human-initiation handoff. A maintainer
# must start the stable Release workflow, then a different maintainer approves
# the protected production environment.
#
# npm distribution is discontinued (2026-05-09 hard cutover, wish
# genie-distribution-cutover G6). Operators install via install.sh
# from GitHub Releases; `genie update` is the canonical update path.
# See docs/release-process.mdx.
#
# SHA-pin invariant (Invariant A — correctness over completeness):
# Dev tags a deterministic version-only child of the commit that passed CI;
# stable/homolog build the exact promotion commit that passed CI.
# Concurrent runs QUEUE per branch+event (no cancellation — see the
# concurrency block below). When dev advances past the SHA a queued
# run checked out, the
# `git push --atomic` rejects rather than mis-tag — emitting
# `release-race.next-tag-pin-skipped.detected` in the CI log. The
# next merge's run catches up.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, homolog, dev]

permissions:
  contents: write          # commit + push version bump + tag
  actions: write           # dispatch trusted release.yml control on main

# RACES: CI completes twice per dev merge (push + pull_request), so separate
# those event classes and never cancel an in-flight version operation. Within
# the push class, serialize main/homolog/dev globally: all three allocate from
# one CalVer tag namespace, and branch-scoped groups could independently choose
# the same max-plus-one tag. Queueing keeps allocation and push one transaction.
concurrency:
  group: version-release-identity-${{ github.event.workflow_run.event }}
  queue: max
  cancel-in-progress: false

jobs:
  auto-version:
    name: Auto Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      release_ready: ${{ steps.commit_and_tag.outputs.release_ready || steps.promoted_tag.outputs.release_ready }}
      version: ${{ steps.commit_and_tag.outputs.version || steps.promoted_tag.outputs.version }}
      channel: ${{ steps.commit_and_tag.outputs.channel || steps.promoted_tag.outputs.channel }}
      source_sha: ${{ steps.commit_and_tag.outputs.source_sha || steps.promoted_tag.outputs.source_sha }}
      source_branch: ${{ steps.commit_and_tag.outputs.source_branch || steps.promoted_tag.outputs.source_branch }}
      source_ci_run_id: ${{ steps.commit_and_tag.outputs.source_ci_run_id || steps.promoted_tag.outputs.source_ci_run_id }}
    if: >-
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       !contains(github.event.workflow_run.head_commit.message, '[auto-version]') &&
       !contains(github.event.workflow_run.head_commit.message, '[release-manifest]') &&
       (
         (github.event.workflow_run.head_branch == 'main') ||
         (github.event.workflow_run.head_branch == 'homolog') ||
         (github.event.workflow_run.head_branch == 'dev')
       ))
    # main/homolog promotion is verified by the "Verify dev promotion" STEP
    # below (merge-commit message OR content match against dev), not by a
    # message-only expression here. Message-only gating silently skipped the
    # stable release whenever a dev→main PR was rebase- or squash-merged
    # (observed #2537 2026-07-09 and #2542 2026-07-10: main advanced, stable
    # .well-known stayed stale, clients downgraded).

    steps:
      - name: Determine branch and version prefix
        id: context
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          case "$BRANCH" in
            main)
              # Main promotion gets a fresh immutable release tag without
              # rewriting its CI-approved source tree.
              echo "branch=main" >> "$GITHUB_OUTPUT"
              echo "should_bump=false" >> "$GITHUB_OUTPUT"
              ;;
            homolog)
              # Homolog promotion gets a fresh immutable release tag without
              # rewriting its CI-approved source tree.
              # Channel: homolog (advances homolog + dev). Felipe directive
              # 2026-05-12 added homolog as the dev→homolog→stable middle
              # tier; genie inherits the surface for cross-repo parity even
              # if its homolog branch is still dormant at PR-merge time.
              echo "branch=homolog" >> "$GITHUB_OUTPUT"
              echo "should_bump=false" >> "$GITHUB_OUTPUT"
              ;;
            dev)
              # Dev push: derive + bump.
              # Channel: dev (advances dev only).
              echo "branch=dev" >> "$GITHUB_OUTPUT"
              echo "should_bump=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error ::release-trigger.branch_untrusted unsupported branch '${BRANCH}'"
              exit 1
              ;;
          esac
          # v5 version scheme: 5.YYMMDD.N (daily counter preserved from v4;
          # only the leading major moved). Must stay in sync with the local
          # generator in scripts/version.ts and the v5.<date>.* tag glob below.
          echo "prefix=5" >> "$GITHUB_OUTPUT"
          echo "Resolved: branch=${BRANCH}"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Pin to the SHA that triggered CI, not the moving branch HEAD,
          # so back-to-back merges never publish a sibling commit's build.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # The triggering commit is data until its successful push-CI identity
          # is bound below. Never leave a write credential in this checkout.
          persist-credentials: false

      # Promotion gate for the no-bump (main/homolog) path. A promotion is a
      # push whose head commit is a dev merge commit ("Merge pull request …
      # /dev") OR whose content equals dev's tip — the latter is what a
      # rebase- or squash-merged dev→main PR produces (no merge commit, so
      # message checks can never see it). The three generated channel manifests
      # are excluded from the content diff: release-publish commits them to main
      # only, so a rebased promotion's tree always differs from dev there.
      # If dev advanced past the PR head before this runs, the content check
      # misses and we skip with a notice — the next promotion catches up
      # (same posture as the atomic tag-push race below).
      - name: Verify dev promotion (main/homolog no-bump path)
        id: promotion
        if: steps.context.outputs.should_bump == 'false'
        run: |
          SUBJECT="$(git show -s --format=%s HEAD)"
          PROMOTED=false
          REASON="not a dev promotion"
          if printf '%s' "${SUBJECT}" | grep -q '^Merge pull request' && printf '%s' "${SUBJECT}" | grep -q '/dev'; then
            PROMOTED=true
            REASON="dev merge commit"
          else
            git fetch origin dev --quiet
            if git diff --quiet origin/dev HEAD -- . \
                ':(exclude).well-known/latest.json' \
                ':(exclude).well-known/homolog.json' \
                ':(exclude).well-known/dev.json'; then
              PROMOTED=true
              REASON="content matches dev tip (rebase/squash promotion)"
            fi
          fi
          echo "promoted=${PROMOTED}" >> "$GITHUB_OUTPUT"
          if [ "${PROMOTED}" = "true" ]; then
            echo "Promotion verified: ${REASON}"
          else
            echo "::notice ::release-trigger.promotion_unverified head commit is neither a dev merge commit nor content-identical to dev — stable/homolog dispatch skipped"
          fi

      - name: Configure git
        if: steps.context.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive version
        id: version
        if: steps.context.outputs.should_bump == 'true'
        run: |
          PREFIX="${{ steps.context.outputs.prefix }}"
          TODAY=$(date -u +%y%m%d)
          EXISTING=$(git tag --list "v${PREFIX}.${TODAY}.*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))
          VERSION="${PREFIX}.${TODAY}.${BUILD_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${VERSION}"

      # SECURITY: every command in this step is trusted workflow control loaded
      # from main. Do not run package scripts, dependency installers, hooks, or
      # any executable from the dev checkout in this write-capable workflow.
      - name: Synchronize the exact six version fields
        if: steps.context.outputs.should_bump == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          JSON_FILES=(
            package.json
            plugins/genie/.claude-plugin/plugin.json
            plugins/genie/.codex-plugin/plugin.json
            plugins/genie/package.json
          )
          MARKETPLACE=.claude-plugin/marketplace.json
          HERMES=plugins/hermes-genie/plugin.yaml

          # Validate every input before the first write. Symlinks are rejected
          # so an allowlisted path cannot redirect a trusted rewrite.
          for path in "${JSON_FILES[@]}" "$MARKETPLACE" "$HERMES"; do
            if [[ ! -f "$path" || -L "$path" ]]; then
              echo "::error ::release-version.invalid_path ${path} must be a regular non-symlink file"
              exit 1
            fi
          done
          for path in "${JSON_FILES[@]}"; do
            jq -e 'type == "object" and (.version | type == "string")' "$path" >/dev/null || {
              echo "::error ::release-version.invalid_json ${path} needs one top-level string version"
              exit 1
            }
          done
          jq -e '
            type == "object" and
            (.plugins | type == "array") and
            ([.plugins[]? | select(type == "object" and .name == "genie")] | length) == 1 and
            ([.plugins[]? | select(type == "object" and .name == "genie")][0].version | type == "string")
          ' "$MARKETPLACE" >/dev/null || {
            echo "::error ::release-version.invalid_marketplace expected exactly one versioned genie entry"
            exit 1
          }
          if [[ "$(grep -Ec '^version: [^[:space:]]+$' "$HERMES")" != 1 ]]; then
            echo "::error ::release-version.invalid_yaml ${HERMES} needs exactly one top-level version"
            exit 1
          fi

          # Rewrite ONLY the version line in place. `jq '.version = $version'`
          # re-serializes the whole document in jq's own style, which expands
          # biome's single-line arrays and fails `bun run lint` on every bump
          # (observed 2026-07-20: v5.260720.2 broke the Quality Gate and blocked
          # promotion). A line-scoped edit also honors this job's own contract:
          # the child commit must be a version-ONLY delta of its parent.
          for path in "${JSON_FILES[@]}"; do
            perl -i -pe '
              BEGIN { $version = $ENV{VERSION}; $done = 0 }
              if (!$done && s/^(\s*"version":\s*)"[^"]*"/$1"$version"/) { $done = 1 }
            ' "$path"
            jq -e --arg version "$VERSION" '.version == $version' "$path" >/dev/null || {
              echo "::error ::release-version.write_failed ${path} version was not updated in place"
              exit 1
            }
          done
          # marketplace.json carries the version inside the single genie entry,
          # so scope the edit to the line following that entry's name.
          perl -i -pe '
            BEGIN { $version = $ENV{VERSION}; $seen = 0; $done = 0 }
            $seen = 1 if /^\s*"name":\s*"genie"\s*,?\s*$/;
            if ($seen && !$done && s/^(\s*"version":\s*)"[^"]*"/$1"$version"/) { $done = 1 }
          ' "$MARKETPLACE"
          jq -e --arg version "$VERSION" '
            [.plugins[]? | select(.name == "genie") | .version] == [$version]
          ' "$MARKETPLACE" >/dev/null || {
            echo "::error ::release-version.write_failed ${MARKETPLACE} genie version was not updated in place"
            exit 1
          }
          tmp="$(mktemp)"
          sed -E "s/^version: [^[:space:]]+$/version: ${VERSION}/" "$HERMES" > "$tmp"
          mv "$tmp" "$HERMES"

          VERSION_PATHS=("${JSON_FILES[@]}" "$MARKETPLACE" "$HERMES")
          git add -- "${VERSION_PATHS[@]}"
          EXPECTED="$(printf '%s\n' "${VERSION_PATHS[@]}" | LC_ALL=C sort)"
          ACTUAL="$(git diff --cached --name-only -- | LC_ALL=C sort)"
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error ::release-version.delta_untrusted expected exactly six version files"
            printf 'expected:\n%s\nactual:\n%s\n' "$EXPECTED" "$ACTUAL" >&2
            exit 1
          fi

      - name: Commit and bind the version-only child
        if: steps.context.outputs.should_bump == 'true'
        id: version_child
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git commit --no-verify -m "chore(version): bump to ${VERSION} [auto-version]"
          PARENT_SHA="$(git rev-parse HEAD^)"
          if [[ "$PARENT_SHA" != "${{ github.event.workflow_run.head_sha }}" ]]; then
            echo "::error ::release-version.parent_mismatch version child is not based on the successful CI head"
            exit 1
          fi
          git tag "v${VERSION}"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # This is the only dev-bump step that receives a credential. All source
      # data has already been rewritten and committed by trusted inline control;
      # no source-controlled executable runs after authentication is installed.
      - name: Atomically push the CI-bound dev release identity
        if: steps.context.outputs.should_bump == 'true'
        id: commit_and_tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_SHA: ${{ steps.version_child.outputs.source_sha }}
          SOURCE_CI_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # If dev advanced past the SHA we checked out, --atomic rejects
          # the push. That's the desired Invariant A behavior: skip rather
          # than mis-tag. Emit a structured notice so the skip is visible
          # in CI logs and detector-greppable. The next merge's run catches
          # up.
          SHORT_SHA="${TRIGGER_SHA:0:7}"
          if ! git push --atomic origin "HEAD:refs/heads/dev" "refs/tags/v${VERSION}"; then
            echo "::notice ::release-race.next-tag-pin-skipped.detected dev advanced past triggering SHA ${SHORT_SHA}; tag push skipped — next merge will republish"
            exit 0
          fi
          echo "tag_pushed=true" >> "$GITHUB_OUTPUT"
          # GITHUB_TOKEN-authored pushes do not trigger CI recursively. Run the
          # read-only gate at the immutable tag (never moving dev) so the exact
          # version child receives the Quality Gate required for promotion.
          if ! gh workflow run ci.yml --repo "${GITHUB_REPOSITORY}" --ref "v${VERSION}"; then
            echo "::error ::release-trigger.child_ci_dispatch_failed CI dispatch failed for exact child v${VERSION}"
            exit 1
          fi
          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=dev" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "source_branch=dev" >> "$GITHUB_OUTPUT"
          echo "source_ci_run_id=${SOURCE_CI_RUN_ID}" >> "$GITHUB_OUTPUT"

      # Each promotion gets a new tag/version. Published GitHub Releases are
      # immutable, so reusing the dev tag would make later evidence/metadata
      # publication impossible. Homolog is dispatched automatically below.
      # Stable deliberately is not: if this
      # GITHUB_TOKEN-authored workflow initiated the production deployment,
      # GitHub's prevent-self-review control would exclude only the bot, not the
      # maintainer who authored/promoted the change. A human workflow_dispatch
      # makes that human the deployment initiator, so production approval must
      # come from a different configured reviewer.
      - name: Resolve promoted tag identity
        id: promoted_tag
        if: steps.context.outputs.should_bump == 'false' && steps.promotion.outputs.promoted == 'true'
        run: |
          set -euo pipefail
          TODAY="$(date -u +%y%m%d)"
          MAX_COUNTER="$(
            git tag --list "v5.${TODAY}.*" |
              sed -nE "s/^v5\\.${TODAY}\\.([1-9][0-9]{0,3})$/\\1/p" |
              sort -n |
              tail -1
          )"
          CURRENT_COUNTER="${MAX_COUNTER:-0}"
          VERSION="5.${TODAY}.$((10#${CURRENT_COUNTER} + 1))"
          [[ "${VERSION##*.}" -le 9999 ]] || {
            echo "::error ::release-trigger.version_exhausted no daily release identities remain for ${TODAY}"
            exit 1
          }
          git tag "v${VERSION}" HEAD
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "source_branch=${{ steps.context.outputs.branch }}" >> "$GITHUB_OUTPUT"
          echo "source_ci_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          case "${{ steps.context.outputs.branch }}" in
            main)
              echo "channel=stable" >> "$GITHUB_OUTPUT"
              echo "release_ready=false" >> "$GITHUB_OUTPUT"
              ;;
            homolog)
              echo "channel=homolog" >> "$GITHUB_OUTPUT"
              echo "release_ready=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Push fresh immutable promotion tag
        if: steps.context.outputs.should_bump == 'false' && steps.promotion.outputs.promoted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.promoted_tag.outputs.version }}
        run: |
          set -euo pipefail
          gh auth setup-git
          git push origin "refs/tags/v${VERSION}"

      - name: Require human initiation for stable release
        if: >-
          steps.context.outputs.should_bump == 'false' &&
          steps.promotion.outputs.promoted == 'true' &&
          steps.context.outputs.branch == 'main'
        env:
          VERSION: ${{ steps.promoted_tag.outputs.version }}
          SOURCE_SHA: ${{ steps.promoted_tag.outputs.source_sha }}
          SOURCE_CI_RUN_ID: ${{ steps.promoted_tag.outputs.source_ci_run_id }}
        run: |
          set -euo pipefail
          echo "::notice ::release-trigger.stable_manual_approval_required v${VERSION} passed main CI; a maintainer must start Release and a different maintainer must approve production"
          {
            printf '%s\n' '## Stable release awaiting maintainer initiation'
            printf '%s\n' 'Open **Actions → Release → Run workflow** on `main` and provide:'
            printf '%s\n' "- version: \`${VERSION}\`"
            printf '%s\n' '- channel: `stable`'
            printf '%s\n' "- source_sha: \`${SOURCE_SHA}\`"
            printf '%s\n' '- source_branch: `main`'
            printf '%s\n' "- source_ci_run_id: \`${SOURCE_CI_RUN_ID}\`"
            printf '%s\n' '' 'The initiator cannot approve the protected production environment.'
          } >> "$GITHUB_STEP_SUMMARY"

      # npm distribution was discontinued 2026-05-09 (wish
      # genie-distribution-cutover G6). The previous npm-publish, audit,
      # and deprecate steps have been deleted. Tag pushes from this
      # workflow drive the reusable release job below; release.yml then
      # sequences build-tarballs + sign-attest +
      # release-publish in one run via workflow_call (wish:
      # release-pipeline-collapse).
      # The npm OIDC trusted-publisher entry on npmjs.com and any
      # NPM_TOKEN secrets are no longer used by this repo and can be
      # removed from repo + org settings.
      # See docs/release-process.mdx for the full posture and the
      # operator-side `npm deprecate` runbook.

  # Automated dev/homolog publication is a local reusable-workflow call from
  # trusted version.yml on main. A dev-controlled workflow cannot forge this
  # caller identity or choose a version/tag. Stable never uses this job.
  release-automated:
    name: Release ${{ needs.auto-version.outputs.channel }} v${{ needs.auto-version.outputs.version }}
    needs: auto-version
    if: needs.auto-version.outputs.release_ready == 'true'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    with:
      version: ${{ needs.auto-version.outputs.version }}
      channel: ${{ needs.auto-version.outputs.channel }}
      source_sha: ${{ needs.auto-version.outputs.source_sha }}
      source_branch: ${{ needs.auto-version.outputs.source_branch }}
      source_ci_run_id: ${{ needs.auto-version.outputs.source_ci_run_id }}
    # Propagate secrets through the call chain so release-publish.yml's
    # manifests job can read RELEASE_MANIFESTS_TOKEN (see release.yml publish).
    secrets: inherit
