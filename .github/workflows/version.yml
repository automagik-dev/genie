name: Version

# Single source of version derivation + tag push for @automagik/genie.
#
#   Trigger                              Context  Bump?
#   -----------------------------------  -------  ------
#   workflow_run (CI success on dev)     dev      yes
#   workflow_run (merge PR to main)      main     no
#   workflow_dispatch (manual)           dev      yes
#
# On dev triggers we DERIVE a fresh version (today + build-count),
# commit + tag + push back to dev. The pushed tag triggers
# release-publish.yml which attaches the signed GitHub Release
# tarballs.
#
# On main triggers (merge from dev) we DO NOT bump — the version is
# already in package.json from the dev tag. The pushed tag (also
# from the merge) drives the @latest release-publish run.
#
# npm distribution is discontinued (2026-05-09 hard cutover, wish
# genie-distribution-cutover G6). Operators install via install.sh
# from GitHub Releases; `genie update` is the canonical update path.
# See docs/release-process.mdx.
#
# SHA-pin invariant (Invariant A — correctness over completeness):
# Version always tags the commit that passed CI, never branch HEAD.
# Per-branch concurrency with cancel-in-progress means older runs
# supersede when dev advances during a Version run (back-to-back
# merges). When dev advances past the SHA we checked out, the
# `git push --atomic` rejects rather than mis-tag — emitting
# `release-race.next-tag-pin-skipped.detected` in the CI log. The
# next merge's run catches up.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write          # commit + push version bump + tag
  actions: write           # `gh workflow run` to dispatch Build Tarballs after tag push

concurrency:
  group: version-${{ github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

jobs:
  auto-version:
    name: Auto Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       !contains(github.event.workflow_run.head_commit.message, '[auto-version]') &&
       (
         (github.event.workflow_run.head_branch == 'main' &&
          startsWith(github.event.workflow_run.head_commit.message, 'Merge pull request') &&
          contains(github.event.workflow_run.head_commit.message, '/dev'))
         ||
         (github.event.workflow_run.head_branch == 'dev')
       ))

    steps:
      - name: Determine branch and version prefix
        id: context
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || 'dev' }}"
          if [ "$BRANCH" = "main" ]; then
            # Main push: tag whatever release.yml just landed.
            # Do NOT bump — package.json already carries the dev-derived version.
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            # Dev push (or manual dispatch): derive + bump.
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi
          echo "prefix=4" >> "$GITHUB_OUTPUT"
          echo "Resolved: branch=${BRANCH}"

      - uses: actions/checkout@v5
        with:
          # Pin to the SHA that triggered CI, not the moving branch HEAD,
          # so back-to-back merges never publish a sibling commit's build.
          # workflow_dispatch has no workflow_run.head_sha — fall back to
          # github.sha (the dispatched ref's HEAD).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Configure git
        if: steps.context.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive version
        id: version
        if: steps.context.outputs.should_bump == 'true'
        run: |
          PREFIX="${{ steps.context.outputs.prefix }}"
          TODAY=$(date -u +%y%m%d)
          EXISTING=$(git tag --list "v${PREFIX}.${TODAY}.*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))
          VERSION="${PREFIX}.${TODAY}.${BUILD_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${VERSION}"

      - name: Sync all version files
        if: steps.context.outputs.should_bump == 'true'
        run: bun run version
        env:
          GENIE_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}

      - name: Format versioned JSON (Biome)
        if: steps.context.outputs.should_bump == 'true'
        run: |
          bunx biome format --write package.json openclaw.plugin.json plugins/genie/.claude-plugin/plugin.json plugins/genie/package.json .claude-plugin/marketplace.json 2>/dev/null || true

      - name: Commit and tag
        if: steps.context.outputs.should_bump == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.context.outputs.branch }}"

          git add -A '*.json' 'src/lib/version.ts'
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(version): bump to ${VERSION} [auto-version]"
          fi

          git tag "v${VERSION}"
          # If dev advanced past the SHA we checked out, --atomic rejects
          # the push. That's the desired Invariant A behavior: skip rather
          # than mis-tag. Emit a structured notice so the skip is visible
          # in CI logs and detector-greppable. The next merge's run catches
          # up.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          if ! git push --atomic origin "HEAD:refs/heads/${BRANCH}" "refs/tags/v${VERSION}"; then
            echo "::notice ::release-race.next-tag-pin-skipped.detected dev advanced past triggering SHA ${SHORT_SHA}; tag push skipped — next merge will republish"
            exit 0
          fi
          echo "tag_pushed=true" >> "$GITHUB_OUTPUT"
        id: commit_and_tag

      # Dispatches the full release pipeline (build → sign-attest →
      # publish) via release.yml's workflow_dispatch entry. Triggered
      # after a tag push since GITHUB_TOKEN-pushed tags don't fire
      # push:tags workflows (anti-recursion guard — see GitHub docs:
      # "Triggering a workflow from a workflow"). workflow_dispatch and
      # repository_dispatch are the documented exceptions — both CAN be
      # invoked by GITHUB_TOKEN, so this step kicks the orchestrator
      # without requiring a PAT.
      #
      # `--ref refs/tags/v${VERSION}` makes release.yml check out the
      # tagged commit; each called workflow then inherits that ref. The
      # cosign keyless OIDC SAN URI for binary tarballs stays bound to
      # `sign-attest.yml@refs/tags/v<version>` (Decision #1 — cosign
      # step ownership preserved) which matches install.sh:24's pin.
      #
      # Skipped on the main-branch path because `should_bump=false` there
      # (no new tag is pushed; the pre-existing dev tag's chain already ran).
      - name: Trigger release pipeline for the new tag
        if: steps.context.outputs.should_bump == 'true' && steps.commit_and_tag.outputs.tag_pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="refs/tags/v${VERSION}"
          echo "Dispatching release pipeline against ${TAG}..."
          # The dispatch is fire-and-forget — release.yml sequences the
          # build → sign-attest → publish chain inside a single run via
          # workflow_call. A failed dispatch is a release-pipeline
          # outage; surface loudly.
          if ! gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${TAG}" --field version="${VERSION}"; then
            echo "::error ::release-trigger.dispatch_failed release.yml dispatch failed for ${TAG} — investigate gh CLI auth or workflow availability before re-running manually"
            exit 1
          fi

      # npm distribution was discontinued 2026-05-09 (wish
      # genie-distribution-cutover G6). The previous npm-publish, audit,
      # and deprecate steps have been deleted. Tag pushes from this
      # workflow drive release.yml via the gh-workflow-run dispatch
      # above; release.yml then sequences build-tarballs + sign-attest +
      # release-publish in one run via workflow_call (wish:
      # release-pipeline-collapse).
      # The npm OIDC trusted-publisher entry on npmjs.com and any
      # NPM_TOKEN secrets are no longer used by this repo and can be
      # removed from repo + org settings.
      # See docs/release-process.mdx for the full posture and the
      # operator-side `npm deprecate` runbook.
