name: Version

# Single source of version derivation + tag push for @automagik/genie.
#
#   Trigger                              Context  Bump?
#   -----------------------------------  -------  ------
#   workflow_run (CI success on dev)     dev      yes
#   workflow_run (merge PR to main)      main     no
#   workflow_dispatch (manual)           dev      yes
#
# On dev triggers we DERIVE a fresh version (today + build-count),
# commit + tag + push back to dev. The pushed tag triggers
# release-publish.yml which attaches the signed GitHub Release
# tarballs.
#
# On main triggers (merge from dev) we DO NOT bump — the version is
# already in package.json from the dev tag. The pushed tag (also
# from the merge) drives the @latest release-publish run.
#
# npm distribution is discontinued (2026-05-09 hard cutover, wish
# genie-distribution-cutover G6). Operators install via install.sh
# from GitHub Releases; `genie update` is the canonical update path.
# See docs/release-process.mdx.
#
# SHA-pin invariant (Invariant A — correctness over completeness):
# Version always tags the commit that passed CI, never branch HEAD.
# Concurrent runs QUEUE per branch+event (no cancellation — see the
# concurrency block below). When dev advances past the SHA a queued
# run checked out, the
# `git push --atomic` rejects rather than mis-tag — emitting
# `release-race.next-tag-pin-skipped.detected` in the CI log. The
# next merge's run catches up.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write          # commit + push version bump + tag
  actions: write           # `gh workflow run` to dispatch Build Tarballs after tag push

# RACE (observed 2026-07-04T23:11:46Z, missed dev release): CI completes twice
# per dev merge (push-event run + pull_request-event run); both trigger this
# workflow. The PR-event run always fails the job `if` (event=='push') and shows
# "skipped" — but in a shared group with cancel-in-progress it CANCELLED the
# in-flight push-event bump. Scope the group by triggering event, and never
# cancel: killing a version bump mid-tag-push is unsafe regardless — queue instead.
concurrency:
  group: version-${{ github.event.workflow_run.head_branch || 'manual' }}-${{ github.event.workflow_run.event || 'dispatch' }}
  cancel-in-progress: false

jobs:
  auto-version:
    name: Auto Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       !contains(github.event.workflow_run.head_commit.message, '[auto-version]') &&
       (
         (github.event.workflow_run.head_branch == 'main') ||
         (github.event.workflow_run.head_branch == 'homolog') ||
         (github.event.workflow_run.head_branch == 'dev')
       ))
    # main/homolog promotion is verified by the "Verify dev promotion" STEP
    # below (merge-commit message OR content match against dev), not by a
    # message-only expression here. Message-only gating silently skipped the
    # stable release whenever a dev→main PR was rebase- or squash-merged
    # (observed #2537 2026-07-09 and #2542 2026-07-10: main advanced, stable
    # .well-known stayed stale, clients downgraded).

    steps:
      - name: Determine branch and version prefix
        id: context
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || 'dev' }}"
          case "$BRANCH" in
            main)
              # Main push: tag whatever release.yml just landed.
              # Do NOT bump — package.json already carries the dev-derived
              # version. Channel: stable (advances latest + homolog + dev).
              echo "branch=main" >> "$GITHUB_OUTPUT"
              echo "should_bump=false" >> "$GITHUB_OUTPUT"
              ;;
            homolog)
              # Homolog push: tag whatever the dev→homolog promotion just
              # landed. Same no-bump posture as main — package.json already
              # carries the dev-derived version that homolog is promoting.
              # Channel: homolog (advances homolog + dev). Felipe directive
              # 2026-05-12 added homolog as the dev→homolog→stable middle
              # tier; genie inherits the surface for cross-repo parity even
              # if its homolog branch is still dormant at PR-merge time.
              echo "branch=homolog" >> "$GITHUB_OUTPUT"
              echo "should_bump=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # Dev push (or manual dispatch): derive + bump.
              # Channel: dev (advances dev only).
              echo "branch=dev" >> "$GITHUB_OUTPUT"
              echo "should_bump=true" >> "$GITHUB_OUTPUT"
              ;;
          esac
          # v5 version scheme: 5.YYMMDD.N (daily counter preserved from v4;
          # only the leading major moved). Must stay in sync with the local
          # generator in scripts/version.ts and the v5.<date>.* tag glob below.
          echo "prefix=5" >> "$GITHUB_OUTPUT"
          echo "Resolved: branch=${BRANCH}"

      - uses: actions/checkout@v5
        with:
          # Pin to the SHA that triggered CI, not the moving branch HEAD,
          # so back-to-back merges never publish a sibling commit's build.
          # workflow_dispatch has no workflow_run.head_sha — fall back to
          # github.sha (the dispatched ref's HEAD).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Promotion gate for the no-bump (main/homolog) path. A promotion is a
      # push whose head commit is a dev merge commit ("Merge pull request …
      # /dev") OR whose content equals dev's tip — the latter is what a
      # rebase- or squash-merged dev→main PR produces (no merge commit, so
      # message checks can never see it). `.well-known` is excluded from the
      # content diff: release-publish commits channel manifests to main only,
      # so a rebased promotion's tree always differs from dev exactly there.
      # If dev advanced past the PR head before this runs, the content check
      # misses and we skip with a notice — the next promotion catches up
      # (same posture as the atomic tag-push race below).
      - name: Verify dev promotion (main/homolog no-bump path)
        id: promotion
        if: steps.context.outputs.should_bump == 'false'
        run: |
          SUBJECT="$(git show -s --format=%s HEAD)"
          PROMOTED=false
          REASON="not a dev promotion"
          if printf '%s' "${SUBJECT}" | grep -q '^Merge pull request' && printf '%s' "${SUBJECT}" | grep -q '/dev'; then
            PROMOTED=true
            REASON="dev merge commit"
          else
            git fetch origin dev --quiet
            if git diff --quiet origin/dev HEAD -- ':(exclude).well-known'; then
              PROMOTED=true
              REASON="content matches dev tip (rebase/squash promotion)"
            fi
          fi
          echo "promoted=${PROMOTED}" >> "$GITHUB_OUTPUT"
          if [ "${PROMOTED}" = "true" ]; then
            echo "Promotion verified: ${REASON}"
          else
            echo "::notice ::release-trigger.promotion_unverified head commit is neither a dev merge commit nor content-identical to dev — stable/homolog dispatch skipped"
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        if: steps.context.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive version
        id: version
        if: steps.context.outputs.should_bump == 'true'
        run: |
          PREFIX="${{ steps.context.outputs.prefix }}"
          TODAY=$(date -u +%y%m%d)
          EXISTING=$(git tag --list "v${PREFIX}.${TODAY}.*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))
          VERSION="${PREFIX}.${TODAY}.${BUILD_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${VERSION}"

      - name: Sync all version files
        if: steps.context.outputs.should_bump == 'true'
        run: bun run version
        env:
          GENIE_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}

      - name: Format versioned JSON (Biome)
        if: steps.context.outputs.should_bump == 'true'
        run: |
          bunx biome format --write package.json plugins/genie/.claude-plugin/plugin.json plugins/genie/.codex-plugin/plugin.json plugins/genie/package.json .claude-plugin/marketplace.json 2>/dev/null || true

      - name: Commit and tag
        if: steps.context.outputs.should_bump == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.context.outputs.branch }}"

          git add -A '*.json' 'src/lib/version.ts'
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(version): bump to ${VERSION} [auto-version]"
          fi

          git tag "v${VERSION}"
          # If dev advanced past the SHA we checked out, --atomic rejects
          # the push. That's the desired Invariant A behavior: skip rather
          # than mis-tag. Emit a structured notice so the skip is visible
          # in CI logs and detector-greppable. The next merge's run catches
          # up.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          if ! git push --atomic origin "HEAD:refs/heads/${BRANCH}" "refs/tags/v${VERSION}"; then
            echo "::notice ::release-race.next-tag-pin-skipped.detected dev advanced past triggering SHA ${SHORT_SHA}; tag push skipped — next merge will republish"
            exit 0
          fi
          echo "tag_pushed=true" >> "$GITHUB_OUTPUT"
        id: commit_and_tag

      # Dispatches the full release pipeline (build → sign-attest →
      # publish) via release.yml's workflow_dispatch entry. Triggered
      # after a tag push since GITHUB_TOKEN-pushed tags don't fire
      # push:tags workflows (anti-recursion guard — see GitHub docs:
      # "Triggering a workflow from a workflow"). workflow_dispatch and
      # repository_dispatch are the documented exceptions — both CAN be
      # invoked by GITHUB_TOKEN, so this step kicks the orchestrator
      # without requiring a PAT.
      #
      # `--ref refs/tags/v${VERSION}` makes release.yml check out the
      # tagged commit; each called workflow then inherits that ref. The
      # cosign keyless OIDC SAN URI for binary tarballs stays bound to
      # `sign-attest.yml@refs/tags/v<version>` (Decision #1 — cosign
      # step ownership preserved) which matches install.sh:24's pin.
      #
      # The bump-path dispatch below only fires on dev (should_bump=true,
      # channel=dev → prerelease). The main/homolog no-bump path needs its
      # OWN dispatch to publish the stable/homolog channel — see the
      # "promoted tag" step further down. Gating the ONLY stable-channel
      # dispatch behind should_bump==true is what froze the stable
      # .well-known/latest.json pointer at v4.260511.5: every main merge
      # ran Version, resolved branch=main, then skipped every step.
      - name: Trigger release pipeline for the new tag
        if: steps.context.outputs.should_bump == 'true' && steps.commit_and_tag.outputs.tag_pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="refs/tags/v${VERSION}"
          # Canonical channel taxonomy (Felipe directive 2026-05-12,
          # unified across the automagik sibling projects):
          #   main    → stable  → .well-known/latest.json
          #   homolog → homolog → .well-known/homolog.json
          #   dev/*   → dev     → .well-known/dev.json
          # The branch identity comes from steps.context.outputs.branch,
          # which was already resolved from workflow_run.head_branch
          # (or the 'dev' default for workflow_dispatch). genie may not
          # have an active homolog branch yet; the case is wired for
          # cross-repo parity + future operator dispatch.
          BRANCH="${{ steps.context.outputs.branch }}"
          case "$BRANCH" in
            main)    CHANNEL="stable" ;;
            homolog) CHANNEL="homolog" ;;
            *)       CHANNEL="dev" ;;
          esac
          echo "Dispatching release pipeline against ${TAG} (channel=${CHANNEL})..."
          # The dispatch is fire-and-forget — release.yml sequences the
          # build → sign-attest → publish chain inside a single run via
          # workflow_call. A failed dispatch is a release-pipeline
          # outage; surface loudly.
          if ! gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${TAG}" --field version="${VERSION}" --field channel="${CHANNEL}"; then
            echo "::error ::release-trigger.dispatch_failed release.yml dispatch failed for ${TAG} — investigate gh CLI auth or workflow availability before re-running manually"
            exit 1
          fi

      # Stable/homolog publish — the no-bump path (a main or homolog
      # merge). should_bump=false here: package.json already carries the
      # dev-derived version the promotion brought over, and the dev chain
      # already pushed tag v<version>. We do NOT bump, commit, or push a
      # tag — we only re-dispatch release.yml against the EXISTING tag with
      # the stable (or homolog) channel so .well-known/latest.json
      # advances. This is the ONLY code path that publishes the stable
      # channel; without it a main merge produces no stable release.
      - name: Trigger release pipeline for the promoted tag (stable/homolog)
        if: steps.context.outputs.should_bump == 'false' && steps.promotion.outputs.promoted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(bun --print "require('./package.json').version")"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ] || [ "${VERSION}" = "undefined" ]; then
            echo "::error ::release-trigger.version_unresolved package.json has no version on the no-bump path — promotion is malformed"
            exit 1
          fi
          TAG="refs/tags/v${VERSION}"
          # Canonical channel taxonomy (Felipe directive 2026-05-12):
          #   main    → stable  → .well-known/latest.json
          #   homolog → homolog → .well-known/homolog.json
          BRANCH="${{ steps.context.outputs.branch }}"
          case "$BRANCH" in
            main)    CHANNEL="stable" ;;
            homolog) CHANNEL="homolog" ;;
            *)       CHANNEL="dev" ;;
          esac
          # The dev chain that derived this version must have already
          # pushed v${VERSION}. If it is missing, the promotion raced ahead
          # of the dev tag — surface loudly rather than dispatch a tag
          # release.yml cannot check out.
          if ! git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "::error ::release-trigger.tag_missing v${VERSION} not on origin — dev derivation chain has not landed its tag; re-run after the dev release completes"
            exit 1
          fi
          echo "Dispatching release pipeline against ${TAG} (channel=${CHANNEL})..."
          if ! gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${TAG}" --field version="${VERSION}" --field channel="${CHANNEL}"; then
            echo "::error ::release-trigger.dispatch_failed release.yml dispatch failed for ${TAG} (channel=${CHANNEL}) — investigate gh CLI auth or workflow availability before re-running manually"
            exit 1
          fi

      # npm distribution was discontinued 2026-05-09 (wish
      # genie-distribution-cutover G6). The previous npm-publish, audit,
      # and deprecate steps have been deleted. Tag pushes from this
      # workflow drive release.yml via the gh-workflow-run dispatch
      # above; release.yml then sequences build-tarballs + sign-attest +
      # release-publish in one run via workflow_call (wish:
      # release-pipeline-collapse).
      # The npm OIDC trusted-publisher entry on npmjs.com and any
      # NPM_TOKEN secrets are no longer used by this repo and can be
      # removed from repo + org settings.
      # See docs/release-process.mdx for the full posture and the
      # operator-side `npm deprecate` runbook.
