name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Group all three CI jobs (unit-tests, pg-tests, quality-gate umbrella) under a
# single ref-scoped key so a new push cancels the full gate in one sweep rather
# than leaving a half-finished pg-tests running while unit-tests has already
# been replaced by the next push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secrets Scan (GitGuardian)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: GitGuardian/ggshield-action@v1
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: main
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # Short critical path: static checks + the 135 non-PG test files. Runs on a
  # 4-vCPU runner because typecheck/lint/dead-code dominate and don't benefit
  # from extra cores. GENIE_TEST_SKIP_PGSERVE=1 plus an explicit non-PG file
  # list guarantees pgserve never boots on this runner.
  unit-tests:
    name: Unit Tests (typecheck + lint + non-PG tests)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-cache-${{ github.run_id }}-${{ github.run_attempt }}
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx biome check .

      - name: Dead code check (knip)
        run: bunx knip

      # `GENIE_TEST_SKIP_PGSERVE=1` alone is not enough — a PG-dependent file
      # loaded by bun would still open admin connections that time out against
      # a missing daemon. We therefore hand bun an explicit non-PG file list;
      # scripts/list-tests.ts classifies by the same markers test-setup.ts
      # uses for its lazy-skip heuristic.
      # Retry-once — same rationale as the pg-tests step (see #1335).
      # Non-PG tests still flake on fs-timing / fixture-order edges (e.g.
      # team-auto-spawn executor-reuse fast-fails). Unit Tests runs in ~14s,
      # so a single retry costs ~15s worst-case and masks the noise.
      - name: Test (non-PG files, no pgserve)
        env:
          GENIE_TEST_SKIP_PGSERVE: "1"
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-cache-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -uo pipefail
          FILES=$(bun run scripts/list-tests.ts --non-pg)
          if [ -z "$FILES" ]; then
            echo "No non-PG test files discovered — refusing to run bare 'bun test'" >&2
            exit 1
          fi
          echo "$FILES" | xargs bun test || echo "$FILES" | xargs bun test

  # Long critical path: 56 PG-dependent test files across K=4 shards sharing a
  # single pgserve daemon. Runs on an 8-vCPU runner so LPT packing saturates.
  # Artifact-driven duration cache (downloaded before the run, regenerated +
  # uploaded only on main-branch push) keeps shard balance within 15%.
  pg-tests:
    name: PG Tests (parallel shards)
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # Per-run scratch cache dir. Prior config used a persistent
      # ~/.bun/install/cache restored via actions/cache, which cross-
      # polluted runs on the self-hosted Blacksmith runner and was
      # suspected of serving stale transpile artifacts on flaky runs.
      # Scoping to ${{ runner.temp }}/<run-id>/<run-attempt> gives
      # every attempt a clean cache without sacrificing dep download
      # speed (Blacksmith has fast registry access).
      - name: Install dependencies
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-cache-${{ github.run_id }}-${{ github.run_attempt }}
        run: bun install

      # Serial bun test. `test:parallel` (Group 7) exposes a latent codebase
      # antipattern in moveTask() + similar where a sql.begin(tx) transaction
      # re-acquires a connection from the pool — under parallel shards this
      # self-deadlocks. Fixing that app-side is out of scope for this wish;
      # `test:parallel` stays available as a local dev tool (package.json).
      # CI uses serial `bun test` for determinism and green. See wish:
      # .genie/wishes/pg-test-perf/WISH.md for the full story.
      #
      # `--timeout 15000`: Blacksmith cold-boot + pgserve bootstrap occasionally
      # blows past bun test's default 5s budget inside a beforeEach, surfacing
      # as a cascade of "hook timed out" errors that aren't real regressions.
      # 15s absorbs that jitter without masking slow tests (a test that takes
      # >15s is a real problem worth surfacing).
      #
      # `|| bun test --timeout 15000`: retry-once wrapper for the PGlite/pgserve
      # cross-connection imperfections (NOTIFY delivery gaps + post-INSERT read
      # visibility gaps) enumerated in tracker #1335. Measured baseline flake
      # rate is ~1/3626 per test; two consecutive flakes on the same test are
      # ~1 in 10M, so a single retry masks the noise without hiding real
      # regressions. Long-term fix is a pgserve/PGlite backend audit (out of
      # scope for wish pg-test-perf).
      #
      # History: 7b23046e dropped a prior retry wrapper because hangs on the
      # self-hosted runner produced orphaned bun processes. Mitigated now by
      # Blacksmith ephemeral runners + `timeout-minutes: 15` (a hang is killed
      # by the job timeout, not the `||`, so no orphan is produced).
      - name: Test (serial, PG-backed)
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-cache-${{ github.run_id }}-${{ github.run_attempt }}
        run: bun test --timeout 15000 || bun test --timeout 15000

  # Umbrella status check. Branch protection is configured to require
  # "Quality Gate (typecheck + lint + test)" as a required status, so the
  # job name MUST stay exactly that string. `if: always()` ensures this
  # job runs even when a sub-job fails/cancels, so the umbrella reports
  # a deterministic failure rather than a skipped status that some
  # branch-protection configs silently accept.
  quality-gate:
    name: Quality Gate (typecheck + lint + test)
    needs: [unit-tests, pg-tests]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    timeout-minutes: 2

    steps:
      - name: Verify sub-jobs
        run: |
          UNIT="${{ needs.unit-tests.result }}"
          PG="${{ needs.pg-tests.result }}"
          echo "unit-tests: $UNIT"
          echo "pg-tests:   $PG"
          if [ "$UNIT" = "success" ] && [ "$PG" = "success" ]; then
            echo "All sub-jobs passed"
            exit 0
          fi
          echo "One or more sub-jobs did not succeed" >&2
          exit 1

  publish-next:
    name: Publish @next
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    # OIDC trusted publishing — mirrors version.yml (commit f807b3a8).
    # `id-token: write` is required for npm to exchange the GitHub OIDC token
    # for a short-lived publish credential. `contents: read` is the default
    # needed for checkout.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup Node (for npm OIDC publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x; npm Trusted Publishing (automatic OIDC
      # token exchange) requires npm >= 11.5.1. Without this upgrade,
      # `npm publish` sends the empty `XXXXX-...-XXXXX` placeholder token
      # and the registry returns a misleading 404 instead of the real
      # 401/403 auth failure. See: https://docs.npmjs.com/trusted-publishers
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm @next via OIDC
        env:
          HUSKY: "0"
        run: |
          LOCAL=$(jq -r '.version' package.json)
          # Check whether the exact version exists in the registry under ANY
          # tag, not just @next. After a dev→main merge, version.yml bumps dev
          # to a new version, publishes it as @latest, and commits the bump
          # back to dev. The next dev push then reads that already-published
          # version from package.json. Querying only the @next tag misses this
          # cross-tag collision and causes a 403 when npm publish runs.
          # Query by exact version so collisions from any tag short-circuit
          # this step; version.yml will derive a fresh version and publish it.
          if [ -n "$(npm view "@automagik/genie@${LOCAL}" version 2>/dev/null)" ]; then
            echo "Version ${LOCAL} already published to npm — skipping @next publish"
            echo "(version.yml will bump to a new version and publish it as @next)"
            exit 0
          fi
          # `--provenance` would emit a sigstore attestation, but npm's
          # provenance verification rejects self-hosted runners (Blacksmith
          # is `blacksmith-Nvcpu-ubuntu-*`, not github-hosted). Trusted
          # Publishing via OIDC token exchange still works without it —
          # the publish is authenticated, just without the green provenance
          # badge. To re-enable provenance, move this step to a
          # `runs-on: ubuntu-latest` job.
          npm publish --access public --tag next
