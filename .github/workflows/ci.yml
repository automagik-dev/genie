name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secrets Scan (GitGuardian)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: GitGuardian/ggshield-action@v1
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: main
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  quality-gate:
    name: Quality Gate (typecheck + lint + test)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx biome check .

      - name: Dead code check (knip)
        run: bunx knip

      - name: Test
        run: bun test || bun test

  publish-next:
    name: Publish @next
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm @next
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: "0"
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping @next publish"
            exit 0
          fi
          LOCAL=$(jq -r '.version' package.json)
          PUBLISHED=$(npm view @automagik/genie@next version 2>/dev/null || echo "none")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "Version $LOCAL already published to @next — skipping"
            exit 0
          fi
          bun publish --tag next --access public
