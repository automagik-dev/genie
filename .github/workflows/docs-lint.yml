name: Docs Lint

# Lints markdown sources and checks that every link in the runbook + SECURITY.md
# still resolves. Enforced as a merge gate on any PR touching these files so the
# incident-response prose does not rot with broken references.
#
# Tools:
#   - markdownlint-cli2 (configured via .markdownlint-cli2.jsonc) — structural
#     markdown issues, code-fence hygiene, bare URLs, list formatting.
#   - markdown-link-check — verifies internal anchors and external URLs. Run
#     with a config that retries on 429/5xx and allows the GitHub user-agent
#     so shortlink checks don't false-fail in CI.

on:
  push:
    branches: [main, dev]
    paths:
      - 'SECURITY.md'
      # Docs live in the .docs-vendor submodule (automagik-dev/docs); trigger
      # on submodule pointer bumps so docs lint runs whenever genie picks up
      # a new docs commit.
      - '.docs-vendor'
      - '.gitmodules'
      - '.markdownlint-cli2.jsonc'
      - '.github/markdown-link-check.json'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'SECURITY.md'
      - '.docs-vendor'
      - '.gitmodules'
      - '.markdownlint-cli2.jsonc'
      - '.github/markdown-link-check.json'
      - '.github/workflows/docs-lint.yml'

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Install locked docs tooling
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint SECURITY.md + runbook
        run: bun run lint:docs-markdown

  link-check:
    name: markdown-link-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Install locked docs tooling
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify links in SECURITY.md + runbook
        run: bun run lint:docs-links
