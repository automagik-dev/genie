name: Release Publish

# Group 3 of genie-distribution-cutover — attaches the signed tarballs +
# cosign bundles + SLSA attestations produced by sign-attest.yml to the
# v<version> GitHub Release, and (for non-draft trusted releases) writes
# .well-known/latest.json into the repo so install.sh + `genie update` can
# resolve the latest version per channel without a CDN.
#
# This replaces the cutover G9 cdn.automagik.dev pipeline. GitHub Releases
# is free, maintained by GitHub, and `gh attestation verify` reads cosign
# signatures from Sigstore Rekor without any custom verification server.
#
# Trigger chain:
#   guarded release.yml@main (stable) OR version.yml@main (dev/homolog)
#     → Build Tarballs → Sign + Attest → THIS
# All artifacts are from one workflow run; there is no standalone dispatch or
# external run-id recovery path.
#
# Verification by consumers:
#   gh release download v<version> --repo automagik-dev/genie --pattern '*.tar.gz'
#   gh attestation verify genie-<version>-<platform>.tar.gz --owner automagik-dev
#   # OR via cosign:
#   cosign verify-blob \
#     --bundle genie-<version>-<platform>.tar.gz.bundle \
#     --certificate-identity-regexp "^https://github\\.com/automagik-dev/genie/\\.github/workflows/sign-attest\\.yml@refs/heads/main$" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     genie-<version>-<platform>.tar.gz

on:
  # Reusable only from the trusted main-controlled release chain. Stable manual
  # recovery routes through release.yml; dev/homolog route through version.yml.
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (must match upstream artifact version)'
        required: true
        type: string
      channel:
        description: 'Release channel (stable / homolog / dev)'
        required: false
        type: string
        default: stable
      source_sha:
        description: 'Exact admitted source commit SHA'
        required: true
        type: string
      source_branch:
        description: 'Branch of the admitted source CI run'
        required: true
        type: string
      source_ci_run_id:
        description: 'Authorizing source CI run ID'
        required: true
        type: string
      draft:
        description: 'Create as draft (require manual promotion)?'
        required: false
        type: boolean
        default: false

concurrency:
  # Only publication is globally serialized. Approval/build/sign jobs for other
  # versions remain parallel, while manifest selection cannot reorder.
  group: release-publish
  queue: max
  cancel-in-progress: false   # never cancel an in-flight publish

permissions:
  contents: read               # each privileged job narrows/elevates explicitly
  attestations: read           # verify any complete published inventory before reuse

jobs:
  # contents:write is useful only after the reusable workflow proves its
  # caller. A dev workflow calling release-publish.yml@main must not inherit a
  # trusted publisher merely because the called file itself lives on main.
  admit:
    name: Admit trusted release orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Bind caller workflow and control commit
        shell: bash
        env:
          CALLER_EVENT: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_SHA: ${{ github.sha }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          EXPECTED_STABLE_CALLER: automagik-dev/genie/.github/workflows/release.yml@refs/heads/main
          EXPECTED_AUTOMATED_CALLER: automagik-dev/genie/.github/workflows/version.yml@refs/heads/main
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_SOURCE_BRANCH: ${{ inputs.source_branch }}
          INPUT_SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
        run: |
          set -euo pipefail
          case "$INPUT_CHANNEL" in
            stable)
              EXPECTED_EVENT=workflow_dispatch
              EXPECTED_CALLER="$EXPECTED_STABLE_CALLER"
              ;;
            homolog|dev)
              EXPECTED_EVENT=workflow_run
              EXPECTED_CALLER="$EXPECTED_AUTOMATED_CALLER"
              ;;
            *)
              echo "::error ::release-caller.channel unknown channel '${INPUT_CHANNEL}'"
              exit 1
              ;;
          esac
          if [[ "$CALLER_EVENT" != "$EXPECTED_EVENT" ||
                "$CALLER_REF" != refs/heads/main ||
                "$CALLER_WORKFLOW_REF" != "$EXPECTED_CALLER" ||
                "$CALLER_WORKFLOW_SHA" != "$CALLER_SHA" ]]; then
            echo "::error ::release-caller.untrusted release-publish rejected caller ${CALLER_WORKFLOW_REF:-<empty>} (${CALLER_EVENT:-<empty>})"
            exit 1
          fi
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ||
                ! "$INPUT_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ||
                ! "$INPUT_SOURCE_CI_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error ::release-caller.inputs release-publish received malformed release identity inputs"
            exit 1
          fi
          case "$INPUT_SOURCE_BRANCH" in main|homolog|dev) ;; *) exit 1 ;; esac
          case "${INPUT_CHANNEL}:${INPUT_SOURCE_BRANCH}" in
            stable:main|homolog:homolog|dev:dev) ;;
            *)
              echo "::error ::release-caller.inputs channel/source branch admission mismatch"
              exit 1
              ;;
          esac
          echo "Trusted release caller admitted at ${CALLER_SHA}"

  prepare-delivery-evidence:
    name: Build canonical delivery descriptors
    needs: admit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Download all signed artifacts (sign-attest.yml)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: genie-*-signed
          merge-multiple: true
          path: dist

      - name: Install cosign for effective-subject verification
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install slsa-verifier for effective-subject verification
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Generate retry-stable candidate manifests and descriptors
        id: build
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          CONTROL_SHA: ${{ github.sha }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Promotions must endorse the already-published immutable subject
          # bytes, not a functionally equivalent current-run rebuild.
          bash scripts/materialize-release-subjects.sh
          mkdir -p candidate-manifests descriptors
          (
            cd candidate-manifests
            bash "${GITHUB_WORKSPACE}/scripts/reconcile-channel-manifests.sh"
          )
          case "$CHANNEL" in
            stable) EVIDENCE_CHANNELS=(stable homolog dev) ;;
            homolog) EVIDENCE_CHANNELS=(homolog dev) ;;
            dev) EVIDENCE_CHANNELS=(dev) ;;
            *) exit 1 ;;
          esac
          PLATFORMS=(linux-x64-glibc linux-x64-musl linux-arm64 darwin-arm64)
          MATRIX='[]'
          for platform in "${PLATFORMS[@]}"; do
            tarball="dist/genie-${VERSION}-${platform}.tar.gz"
            [[ -f "$tarball" && ! -L "$tarball" && -s "$tarball" ]] || {
              echo "::error::missing physical signed tarball ${tarball}"
              exit 1
            }
            for evidence_channel in "${EVIDENCE_CHANNELS[@]}"; do
              case "$evidence_channel" in
                stable) manifest=candidate-manifests/.well-known/latest.json ;;
                homolog) manifest=candidate-manifests/.well-known/homolog.json ;;
                dev) manifest=candidate-manifests/.well-known/dev.json ;;
              esac
              descriptor="descriptors/genie-${VERSION}-${platform}.tar.gz.${evidence_channel}.delivery.json"
              bun scripts/build-delivery-evidence.ts \
                --tarball "$tarball" \
                --manifest "$manifest" \
                --output "$descriptor" \
                --repository "$RELEASE_REPOSITORY" \
                --version "$VERSION" \
                --channel "$evidence_channel" \
                --platform-id "$platform" \
                --source-sha "$SOURCE_SHA" \
                --source-branch "$SOURCE_BRANCH" \
                --source-ci-run-id "$SOURCE_CI_RUN_ID" \
                --control-sha "$CONTROL_SHA"
              MATRIX="$(jq -cn \
                --argjson current "$MATRIX" \
                --arg platform "$platform" \
                --arg channel "$evidence_channel" \
                '$current + [{platform: $platform, channel: $channel}]')"
            done
          done
          echo "matrix={\"include\":${MATRIX}}" >> "$GITHUB_OUTPUT"

      - name: Upload exact candidate manifest bytes
        uses: actions/upload-artifact@b7c4aadc2c921a8ff42c1c6b0e8950fc060e7c7e # v4
        with:
          name: delivery-candidate-manifests
          path: candidate-manifests/.well-known/*.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload canonical descriptor subjects
        uses: actions/upload-artifact@b7c4aadc2c921a8ff42c1c6b0e8950fc060e7c7e # v4
        with:
          name: delivery-descriptors
          path: descriptors/*.delivery.json
          if-no-files-found: error
          retention-days: 1

  attest-delivery-evidence:
    name: Endorse ${{ matrix.channel }} / ${{ matrix.platform }}
    needs: prepare-delivery-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-delivery-evidence.outputs.matrix) }}
    steps:
      - name: Download canonical descriptor subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-descriptors
          path: descriptors

      - name: Attest exact descriptor bytes
        id: endorse
        uses: actions/attest@67422f5511b7ff725f4dbd6fb9bd2cd925c65a8d # v1.4.1
        with:
          subject-path: descriptors/genie-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.${{ matrix.channel }}.delivery.json
          predicate-type: https://github.com/${{ github.repository }}/delivery-evidence/v1
          predicate-path: descriptors/genie-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.${{ matrix.channel }}.delivery.json

      - name: Name the persisted Sigstore bundle beside its subject
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.endorse.outputs.bundle-path }}
          DESCRIPTOR: descriptors/genie-${{ inputs.version }}-${{ matrix.platform }}.tar.gz.${{ matrix.channel }}.delivery.json
        run: |
          set -euo pipefail
          [[ -f "$BUNDLE_PATH" && ! -L "$BUNDLE_PATH" && -s "$BUNDLE_PATH" ]]
          cp "$BUNDLE_PATH" "${DESCRIPTOR}.sigstore.json"

      - name: Upload persisted endorsement
        uses: actions/upload-artifact@b7c4aadc2c921a8ff42c1c6b0e8950fc060e7c7e # v4
        with:
          name: delivery-endorsement-${{ matrix.channel }}-${{ matrix.platform }}
          path: descriptors/*.sigstore.json
          if-no-files-found: error
          retention-days: 1

  delivery-evidence-compatibility:
    name: Verify production delivery evidence compatibility
    needs: [admit, attest-delivery-evidence]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install the shipped production verifier dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download canonical delivery descriptor subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-descriptors
          path: descriptors

      - name: Download all persisted endorsement bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: delivery-endorsement-*
          merge-multiple: true
          path: descriptors

      - name: Download exact candidate manifests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-candidate-manifests
          path: candidate-manifests

      - name: Verify every pack with the production offline verifier
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          case "$CHANNEL" in
            stable) EXPECTED_PACKS=12 ;;
            homolog) EXPECTED_PACKS=8 ;;
            dev) EXPECTED_PACKS=4 ;;
            *) exit 1 ;;
          esac
          shopt -s nullglob
          DESCRIPTORS=(descriptors/*.delivery.json)
          [[ ${#DESCRIPTORS[@]} -eq "$EXPECTED_PACKS" ]] || {
            echo "::error::expected ${EXPECTED_PACKS} delivery descriptors, found ${#DESCRIPTORS[@]}"
            exit 1
          }
          for descriptor in "${DESCRIPTORS[@]}"; do
            case "$descriptor" in
              *.stable.delivery.json) manifest=candidate-manifests/latest.json ;;
              *.homolog.delivery.json) manifest=candidate-manifests/homolog.json ;;
              *.dev.delivery.json) manifest=candidate-manifests/dev.json ;;
              *) exit 1 ;;
            esac
            bundle="${descriptor}.sigstore.json"
            [[ -f "$bundle" && ! -L "$bundle" && -s "$bundle" ]]
            [[ -f "$manifest" && ! -L "$manifest" && -s "$manifest" ]]
            bun scripts/verify-delivery-evidence-pack.ts \
              --descriptor "$descriptor" \
              --bundle "$bundle" \
              --manifest "$manifest"
          done

  publish:
    name: Publish to GitHub Releases
    needs: [admit, attest-delivery-evidence, delivery-evidence-compatibility]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download all signed artifacts (sign-attest.yml)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: genie-*-signed
          merge-multiple: true
          path: dist

      - name: Download canonical delivery descriptor subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-descriptors
          path: dist

      - name: Download all delivery endorsement bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: delivery-endorsement-*
          merge-multiple: true
          path: dist

      - name: Download exact candidate manifests for inventory binding
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-candidate-manifests
          path: ${{ runner.temp }}/candidate-manifests

      - name: Resolve version + channel + asset inventory
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          TARBALLS=( genie-*.tar.gz )
          if [[ ${#TARBALLS[@]} -eq 0 ]]; then
            echo "::error::no signed tarballs downloaded from upstream run"
            ls -la
            exit 1
          fi
          # Naming contract from sign-attest.yml output: genie-<VERSION>-<PLATFORM>.tar.gz
          # where PLATFORM ∈ {linux-x64-glibc, linux-x64-musl, linux-arm64, darwin-arm64}.
          FIRST="${TARBALLS[0]}"
          PARSED=$(echo "${FIRST}" | sed -E 's/^genie-(.+)-(linux-x64-glibc|linux-x64-musl|linux-arm64|darwin-arm64)\.tar\.gz$/\1/')
          if [[ -z "${PARSED}" || "${PARSED}" == "${FIRST}" ]]; then
            echo "::error::could not parse VERSION from filename '${FIRST}'"
            exit 1
          fi
          VERSION="${PARSED}"
          if [[ -n "${INPUT_VERSION:-}" && "${INPUT_VERSION}" != "${VERSION}" ]]; then
            echo "::error::workflow_dispatch input version='${INPUT_VERSION}' does not match upstream artifact version='${VERSION}'"
            exit 1
          fi
          # Channel: workflow_dispatch picks; workflow_run defaults to stable.
          CHANNEL="${INPUT_CHANNEL:-}"
          if [[ -z "${CHANNEL}" ]]; then
            CHANNEL="stable"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Resolved: VERSION=${VERSION} CHANNEL=${CHANNEL}"
          echo "Tarballs: ${#TARBALLS[@]}"
          echo "=== dist/ exact inventory: 12 release assets plus selected-channel delivery evidence fanout ==="
          ls -la

      - name: Install cosign for published-asset reuse verification
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install slsa-verifier for published-asset reuse verification
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Prepare draft and reconcile exact endorsed assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          DRAFT: ${{ inputs.draft }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          CANDIDATE_MANIFEST_DIR: ${{ runner.temp }}/candidate-manifests
        shell: bash
        run: |
          set -euo pipefail
          # New releases remain draft/non-latest until every exact asset is
          # remotely verified. Finalize then proves repository immutability
          # before the endorsed manifest bytes may be reconciled.
          # Existing complete releases are reused byte for
          # byte; partial published releases and mismatches fail closed. The
          # repository setting is an externally verified cutover prerequisite:
          # GITHUB_TOKEN cannot read the Administration API that exposes it.
          bash scripts/reconcile-release-note.sh prepare
          bash scripts/reconcile-release-assets.sh

  manifests:
    name: Advance authoritative channel manifests
    needs: finalize
    if: ${{ !inputs.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      # No reviewers: dev/homolog stay automatic. The environment is restricted
      # to main and holds the sole credential (RELEASE_MANIFESTS_TOKEN) allowed
      # to push the .well-known manifests through main branch protection.
      name: release-manifests
    permissions:
      contents: read
    # -----------------------------------------------------------------------
    # HUMAN SETUP (one-time) — the manifest push authenticates with a
    # fine-grained PAT, NOT a deploy key. Deploy keys are DISABLED org-wide
    # (repos/automagik-dev/genie/keys POST → 422 "Deploy keys are disabled"),
    # so the old ssh-key model silently fell back to github-actions[bot]'s
    # token, whose push to protected main 403s. That broke 4 releases.
    #
    # To provision (repo/org admin):
    #   1. Create a FINE-GRAINED PAT scoped to automagik-dev/genie ONLY, with
    #      Repository permissions → Contents: Read and write (nothing else).
    #   2. Store it as the environment secret RELEASE_MANIFESTS_TOKEN in the
    #      `release-manifests` GitHub environment (Settings → Environments).
    #   3. Allow the PAT's identity through main branch protection (add it to
    #      the bypass/allow list for "Restrict who can push to matching
    #      branches"), or the push will 403 exactly as the deploy key did.
    #   4. Delete the now-unused RELEASE_MANIFESTS_DEPLOY_KEY environment
    #      secret and any orphaned deploy key.
    # (Kept in the workflow header because docs/ is a submodule; mirror this
    #  into docs/release-process.mdx when that submodule is next updated.)
    # -----------------------------------------------------------------------
    steps:
      - name: Preflight — require the manifest push token
        env:
          RELEASE_MANIFESTS_TOKEN: ${{ secrets.RELEASE_MANIFESTS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_MANIFESTS_TOKEN}" ]]; then
            echo "::error::RELEASE_MANIFESTS_TOKEN is not set in the 'release-manifests' environment." >&2
            echo "::error::Without it actions/checkout silently falls back to github-actions[bot], whose push to protected main is rejected 403 (misreported below as a CAS race)." >&2
            echo "::error::Fix: create a fine-grained PAT (contents:read+write on automagik-dev/genie only), store it as the RELEASE_MANIFESTS_TOKEN environment secret, allow it through main branch protection, then delete the stale RELEASE_MANIFESTS_DEPLOY_KEY. See this job's HUMAN SETUP header." >&2
            exit 1
          fi
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.RELEASE_MANIFESTS_TOKEN }}
          persist-credentials: true

      - name: Download the exact pre-endorsed candidate manifest bytes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-candidate-manifests
          path: ${{ runner.temp }}/candidate-manifests

      # ---------------------------------------------------------------------
      # Per-channel manifest pointers — committed to main so install.sh +
      # `genie update` can resolve the current version for each channel via:
      #   curl -fsSL https://raw.githubusercontent.com/automagik-dev/genie/main/.well-known/<channel>.json
      #
      # Filename map (per wish release-channel-dev, 2026-05-11):
      #   stable → latest.json     (kept for back-compat with v1 manifest layout)
      #   dev    → dev.json        (replaces the old "next.json" producer concept)
      #   homolog → homolog.json
      #
      # The stable-only gate that lived here through v4.260511.3 was lifted —
      # every non-draft publish writes the manifest(s) for the channel(s) it
      # advances. A stable release ALSO advances dev (single-pipeline reality:
      # there is no dev-only release path today — every release is the latest
      # of both channels). When a dev-only pipeline lands later, channel=dev
      # writes ONLY dev.json and latest.json stays at the prior stable.
      # ---------------------------------------------------------------------
      - name: Update channel manifests (.well-known/*.json — non-draft only)
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "release-bot"
          git config user.email "release-bot@namastex.com"
          # Preserve the helper from this admitted control commit. Each retry
          # evaluates it against a freshly fetched main tree; a concurrent
          # writer can cause a non-fast-forward, never a lost/downgraded update.
          MANIFEST_RECONCILER="${RUNNER_TEMP}/reconcile-channel-manifests-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.sh"
          cp scripts/reconcile-channel-manifests.sh "$MANIFEST_RECONCILER"
          CANDIDATE_MANIFEST_DIR="${RUNNER_TEMP}/candidate-manifests"
          manifests_reconciled=false

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git switch --detach origin/main

            # Stable/homolog fan out to downstream pointers, but each file
            # moves independently and monotonically. An older delayed release
            # may advance stable while preserving newer downstream pointers.
            RELEASE_REPOSITORY="${{ github.repository }}" CANDIDATE_MANIFEST_DIR="$CANDIDATE_MANIFEST_DIR" \
              bash "$MANIFEST_RECONCILER"

            # Stage the complete fixed allowlist. Staging before diff handles
            # both modified and bootstrap/untracked manifests.
            MANIFEST_PATHS=()
            for f in latest.json homolog.json dev.json; do
              [[ -f ".well-known/${f}" && ! -L ".well-known/${f}" ]] && MANIFEST_PATHS+=(".well-known/${f}")
            done
            git add -- "${MANIFEST_PATHS[@]}"
            if git diff --cached --quiet HEAD -- "${MANIFEST_PATHS[@]}"; then
              echo "manifests already monotonic — nothing to commit"
              manifests_reconciled=true
              break
            fi
            git commit -m "chore(release): advance eligible manifests (${CHANNEL}) → v${VERSION} [release-manifest]"
            # Classify the push failure: a non-fast-forward is a genuine CAS
            # race worth retrying; a permission/branch-protection rejection is
            # NOT — retry-looping on it just wastes 5 attempts and misreports a
            # 403 as "lost a concurrent main update" (the historic misdiagnosis
            # that hid the missing-credential bug). Fail loudly and immediately.
            if push_output="$(git push origin "HEAD:refs/heads/main" 2>&1)"; then
              printf '%s\n' "$push_output"
              manifests_reconciled=true
              break
            fi
            printf '%s\n' "$push_output" >&2
            if printf '%s' "$push_output" | grep -qiE 'protected branch|GH006|permission to .* denied|not authorized|403|forbidden|remote rejected'; then
              echo "::error::manifest push to main was REJECTED for lack of permission — this is NOT a concurrent-update CAS race. RELEASE_MANIFESTS_TOKEN lacks contents:write on ${GITHUB_REPOSITORY} or is not allowed through main branch protection. See this job's HUMAN SETUP header." >&2
              exit 1
            fi
            echo "::warning ::release-manifest.cas_retry attempt ${attempt}/5: non-fast-forward from a concurrent main update; recomputing"
          done

          if [[ "$manifests_reconciled" != true ]]; then
            echo "::error::manifest push to main failed after 5 monotonic retries; release pointer was not advanced"
            exit 1
          fi

  finalize:
    name: Finalize immutable release before manifest publication
    needs: publish
    if: ${{ !inputs.draft && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download all signed artifacts (sign-attest.yml)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: genie-*-signed
          merge-multiple: true
          path: dist

      - name: Download canonical delivery descriptor subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-descriptors
          path: dist

      - name: Download all delivery endorsement bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: delivery-endorsement-*
          merge-multiple: true
          path: dist

      - name: Download exact candidate manifests for final inventory binding
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: delivery-candidate-manifests
          path: ${{ runner.temp }}/candidate-manifests

      - name: Install cosign for final remote verification
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install slsa-verifier for final remote verification
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Publish, lock, and reverify the complete remote inventory
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          DRAFT: ${{ inputs.draft }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          CANDIDATE_MANIFEST_DIR: ${{ runner.temp }}/candidate-manifests
        run: |
          set -euo pipefail
          bash scripts/reconcile-release-note.sh finalize
          # Every channel owns a fresh tag. Publish and lock the exact verified
          # inventory before any public manifest can name it.
          bash scripts/release-immutability.sh release
          bash scripts/reconcile-release-assets.sh
