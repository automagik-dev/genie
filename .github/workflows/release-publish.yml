name: Release Publish

# Group 3 of genie-distribution-cutover — attaches the signed tarballs +
# cosign bundles + SLSA attestations produced by sign-attest.yml to the
# v<version> GitHub Release, and (for stable, non-draft tag pushes) writes
# .well-known/latest.json into the repo so install.sh + `genie update` can
# resolve the latest version per channel without a CDN.
#
# This replaces the cutover G9 cdn.automagik.dev pipeline. GitHub Releases
# is free, maintained by GitHub, and `gh attestation verify` reads cosign
# signatures from Sigstore Rekor without any custom verification server.
#
# Trigger chain (lifted from pgserve, adapted for Sign + Attest upstream):
#   tag push v* → Build Tarballs → Sign + Attest Tarballs → THIS workflow
#                                  (workflow_run, success only)
#
# workflow_dispatch is the manual override for re-publishing or promoting
# a draft release; it requires the upstream sign-attest run-id so the
# 12 signed assets (4 platforms × {tarball, bundle, intoto.jsonl}) can
# be downloaded from that run.
#
# Verification by consumers:
#   gh release download v<version> --repo automagik-dev/genie --pattern '*.tar.gz'
#   gh attestation verify genie-<version>-<platform>.tar.gz --owner automagik-dev
#   # OR via cosign:
#   cosign verify-blob \
#     --bundle genie-<version>-<platform>.tar.gz.bundle \
#     --certificate-identity-regexp "^https://github.com/automagik-dev/genie/.github/workflows/sign-attest.yml@" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     genie-<version>-<platform>.tar.gz

on:
  # Reusable from release.yml orchestrator. The orchestrator drives the full
  # build → sign → publish chain in one run, so signed artifacts pass via the
  # run-shared store (no run_id input). draft defaults to false here because
  # the orchestrator path is the production-safe automated path; the
  # workflow_dispatch escape hatch keeps draft=true for replay safety.
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (must match upstream artifact version)'
        required: true
        type: string
      channel:
        description: 'Release channel (stable / beta / canary)'
        required: false
        type: string
        default: stable
      draft:
        description: 'Create as draft (require manual promotion)?'
        required: false
        type: boolean
        default: false
  # Manual-recovery escape hatch — operators can re-publish from a stranded
  # sign-attest run by passing version + run_id explicitly. draft defaults
  # to true here so a replay never auto-promotes by accident.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match upstream artifact version)'
        required: true
        type: string
      run_id:
        description: 'sign-attest.yml run ID to download signed artifacts from'
        required: true
        type: string
      channel:
        description: 'Release channel (stable = no --prerelease; homolog/dev = --prerelease)'
        required: true
        type: choice
        default: stable
        # Canonical channel taxonomy (Felipe directive 2026-05-12,
        # unified across pgserve/omni/genie). beta + canary retired.
        options:
          - stable
          - homolog
          - dev
      draft:
        description: 'Create as draft (require manual promotion)?'
        required: true
        type: boolean
        default: true

concurrency:
  group: release-publish-${{ github.ref }}-${{ inputs.version || github.sha }}
  cancel-in-progress: false   # never cancel an in-flight publish

permissions:
  contents: write              # gh release create/upload + push latest.json commit

jobs:
  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Resolve upstream sign-attest run-id
        id: src
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the upstream run-id that holds the signed artifacts:
          #  - workflow_dispatch break-glass: operator supplies inputs.run_id
          #    pointing at a prior sign-attest run.
          #  - workflow_call from release.yml orchestrator: sign-attest ran
          #    in THIS run; default to github.run_id so download-artifact pulls
          #    from the current run's shared artifact store.
          if [[ -n "${{ inputs.run_id }}" ]]; then
            RUN_ID="${{ inputs.run_id }}"
          else
            RUN_ID="${{ github.run_id }}"
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "Upstream sign-attest run-id: ${RUN_ID}"

      - name: Download all signed artifacts (sign-attest.yml)
        uses: actions/download-artifact@v4
        with:
          pattern: genie-*-signed
          merge-multiple: true
          path: dist
          run-id: ${{ steps.src.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + channel + asset inventory
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          TARBALLS=( genie-*.tar.gz )
          if [[ ${#TARBALLS[@]} -eq 0 ]]; then
            echo "::error::no signed tarballs downloaded from upstream run"
            ls -la
            exit 1
          fi
          # Naming contract from sign-attest.yml output: genie-<VERSION>-<PLATFORM>.tar.gz
          # where PLATFORM ∈ {linux-x64-glibc, linux-x64-musl, linux-arm64, darwin-arm64}.
          FIRST="${TARBALLS[0]}"
          PARSED=$(echo "${FIRST}" | sed -E 's/^genie-(.+)-(linux-x64-glibc|linux-x64-musl|linux-arm64|darwin-arm64)\.tar\.gz$/\1/')
          if [[ -z "${PARSED}" || "${PARSED}" == "${FIRST}" ]]; then
            echo "::error::could not parse VERSION from filename '${FIRST}'"
            exit 1
          fi
          VERSION="${PARSED}"
          if [[ -n "${INPUT_VERSION:-}" && "${INPUT_VERSION}" != "${VERSION}" ]]; then
            echo "::error::workflow_dispatch input version='${INPUT_VERSION}' does not match upstream artifact version='${VERSION}'"
            exit 1
          fi
          # Channel: workflow_dispatch picks; workflow_run defaults to stable.
          CHANNEL="${INPUT_CHANNEL:-}"
          if [[ -z "${CHANNEL}" ]]; then
            CHANNEL="stable"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Resolved: VERSION=${VERSION} CHANNEL=${CHANNEL}"
          echo "Tarballs: ${#TARBALLS[@]}"
          echo "=== dist/ inventory (expect 12 files: 4× tarball + 4× bundle + 4× intoto.jsonl) ==="
          ls -la

      - name: Create or update GitHub Release with all 12 signed assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          DRAFT_FLAG: ${{ inputs.draft && '--draft' || '' }}
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "${CHANNEL}" != "stable" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if ! gh release view "v${VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # shellcheck disable=SC2086 # intentional word-split on optional flags
            gh release create "v${VERSION}" \
              --repo "${{ github.repository }}" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION} (channel: ${CHANNEL})" \
              ${DRAFT_FLAG} ${PRERELEASE_FLAG}
          fi

          # Reconcile release flags to the channel — idempotent, and the
          # whole point on the stable re-dispatch path: the dev chain
          # creates v${VERSION} as --prerelease, then a dev→main merge
          # re-dispatches this workflow with channel=stable. The release
          # already exists, so the `gh release create` branch above is
          # skipped and the prerelease flag would never flip. Without this
          # block, .well-known/latest.json advances but GitHub's "Latest"
          # badge stays stuck on the old stable tag (the v4.260511.5
          # symptom). Drafts can't be marked latest, so skip when drafting.
          if [[ -z "${DRAFT_FLAG}" ]]; then
            if [[ "${CHANNEL}" == "stable" ]]; then
              gh release edit "v${VERSION}" --repo "${{ github.repository }}" \
                --prerelease=false --latest
            else
              gh release edit "v${VERSION}" --repo "${{ github.repository }}" \
                --prerelease=true --latest=false
            fi
          fi

          if [[ -d dist && -n "$(ls -A dist 2>/dev/null)" ]]; then
            gh release upload "v${VERSION}" \
              --repo "${{ github.repository }}" \
              --clobber \
              dist/*
          else
            echo "::error::dist/ is empty — nothing to upload"
            exit 1
          fi

          # Sanity: confirm release page now lists all 12 assets.
          ASSET_COUNT=$(gh release view "v${VERSION}" --repo "${{ github.repository }}" --json assets --jq '.assets | length')
          echo "v${VERSION} now lists ${ASSET_COUNT} assets"
          if [[ "${ASSET_COUNT}" -lt 12 ]]; then
            echo "::warning::expected 12 assets, found ${ASSET_COUNT}"
          fi

      # ---------------------------------------------------------------------
      # Per-channel manifest pointers — committed to main so install.sh +
      # `genie update` can resolve the current version for each channel via:
      #   curl -fsSL https://raw.githubusercontent.com/automagik-dev/genie/main/.well-known/<channel>.json
      #
      # Filename map (per wish release-channel-dev, 2026-05-11):
      #   stable → latest.json     (kept for back-compat with v1 manifest layout)
      #   dev    → dev.json        (replaces the old "next.json" producer concept)
      #   beta   → beta.json
      #   canary → canary.json
      #
      # The stable-only gate that lived here through v4.260511.3 was lifted —
      # every non-draft publish writes the manifest(s) for the channel(s) it
      # advances. A stable release ALSO advances dev (single-pipeline reality:
      # there is no dev-only release path today — every release is the latest
      # of both channels). When a dev-only pipeline lands later, channel=dev
      # writes ONLY dev.json and latest.json stays at the prior stable.
      # ---------------------------------------------------------------------
      - name: Update channel manifests (.well-known/*.json — non-draft only)
        if: ${{ !inputs.draft }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
        shell: bash
        run: |
          set -euo pipefail
          # Switch to a fresh checkout of main; the workflow_run trigger
          # may have checked out a tag commit (head_branch=v...).
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          # stable keeps the historical filename `latest.json`; every other
          # channel uses its own name. install.sh + genie update's
          # `manifestUrlForChannel` consume the same convention.
          # Channels to advance on this release. A stable release is also
          # the latest dev release (today we have a single release pipeline
          # — every release advances both pointers). Future dev-only
          # releases (channel=dev with --prerelease) only advance dev.json.
          # latest.json is the back-compat name for stable; dev.json is the
          # new dev-channel pointer (wish release-channel-dev).
          # Canonical taxonomy: stable / homolog / dev (Felipe directive
          # 2026-05-12, cross-repo unified). Promotion subsumes downstream:
          # - stable advances latest.json + homolog.json + dev.json
          # - homolog advances homolog.json + dev.json
          # - dev advances only dev.json
          declare -A MANIFEST_FILES=()
          case "$CHANNEL" in
            stable)
              MANIFEST_FILES[stable]="latest.json"
              MANIFEST_FILES[homolog]="homolog.json"
              MANIFEST_FILES[dev]="dev.json"
              ;;
            homolog)
              MANIFEST_FILES[homolog]="homolog.json"
              MANIFEST_FILES[dev]="dev.json"
              ;;
            dev)
              MANIFEST_FILES[dev]="dev.json"
              ;;
            *)
              echo "::error::unknown channel: $CHANNEL (valid: stable, homolog, dev)"
              exit 1
              ;;
          esac

          mkdir -p .well-known
          for manifest_channel in "${!MANIFEST_FILES[@]}"; do
            FILE="${MANIFEST_FILES[$manifest_channel]}"
            cat > ".well-known/${FILE}" <<EOF
          {
            "schema_version": 1,
            "channel": "${manifest_channel}",
            "version": "${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "tarball_base": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}",
            "platforms": ["linux-x64-glibc", "linux-x64-musl", "linux-arm64", "darwin-arm64"]
          }
          EOF
          done

          git config user.name "release-bot"
          git config user.email "release-bot@namastex.com"
          # Stage first, then compare against HEAD. `git diff --quiet <path>`
          # returns 0 (no diff) for *untracked* files because they aren't in
          # the index at all — so the bootstrap case ("file has never existed
          # on main") fell through and silently no-op'd every release until
          # PR #2412 bootstrapped manually. Staging registers the path; then
          # `git diff --cached --quiet HEAD --` correctly reports "differs from
          # HEAD" for both new and modified files.
          MANIFEST_PATHS=()
          for f in "${MANIFEST_FILES[@]}"; do
            MANIFEST_PATHS+=(".well-known/${f}")
          done
          git add "${MANIFEST_PATHS[@]}"
          if git diff --cached --quiet HEAD -- "${MANIFEST_PATHS[@]}"; then
            echo "manifests unchanged — nothing to commit"
            exit 0
          fi
          MANIFEST_LIST=$(IFS=','; echo "${!MANIFEST_FILES[*]}")
          git commit -m "chore(release): update manifests (${MANIFEST_LIST}) → v${VERSION}"
          git push origin main || {
            echo "::warning::push to main failed (likely branch protection or permission); update ${MANIFEST_PATHS[*]} manually"
            exit 0
          }
