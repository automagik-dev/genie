[package]
name = "genie-desktop"
version = "0.1.0"
description = "Genie AI Agent Cockpit"
edition = "2021"

[build-dependencies]
tauri-build = { version = "1", features = [] }

[dependencies]
tauri = { version = "1", features = ["shell-sidecar", "shell-open", "process-exit"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
