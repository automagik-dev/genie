<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genie</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: var(--genie-bg);
        color: var(--genie-text);
        font-family: var(--genie-font);
        -webkit-font-smoothing: antialiased;
      }
      /* Prevent text selection on nav elements */
      [data-nav] { user-select: none; -webkit-user-select: none; }
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--genie-scroll-track); }
      ::-webkit-scrollbar-thumb { background: var(--genie-scroll-thumb); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
