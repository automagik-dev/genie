name: genie
version: 0.1.0
description: "Native Hermes surface for Genie orchestration: read-only status, board, wish, task, work-plan, and review-plan tools plus KHAW bridge hooks, commands, and skills."
provides_tools:
  - genie_status
  - genie_board
  - genie_wish_status
  - genie_task_list
  - genie_task_status
  - genie_work_plan
  - genie_review_plan
provides_hooks:
  - on_session_start
  - pre_tool_call
  - post_tool_call
provides_commands:
  - genie
  - genie-board
  - genie-wish
  - genie-work-plan
  - genie-review-plan
provides_cli_commands:
  - genie
provides_skills:
  - genie
  - genie-work
  - genie-review
  - genie-khaw-bridge
